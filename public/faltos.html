<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="favicon.ico?v=3" type="image/x-icon">
  <link rel="icon" href="favicon.png?v=3" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faltos — REGPOL Callao</title>
  <link rel="stylesheet" href="style.css?v=69">
  <link rel="stylesheet" href="responsive.css?v=3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="api-config.js?v=2"></script>
  <style>
    .fl-wrap{max-width:920px;margin:0 auto;padding:24px 16px 48px;}
    .fl-tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .fl-tab{background:#e8f0ec;border:none;padding:10px 16px;border-radius:8px;font-weight:700;font-size:13px;color:#004d3d;cursor:pointer;}
    .fl-tab.on{background:#004d3d;color:#fff;}
    .fl-card{background:#fff;border:1.5px solid #c8e6c9;border-radius:12px;padding:22px;}
    .fl-card h2{color:#004d3d;font-size:16px;margin:0 0 6px;}
    .fl-card .sub{color:#666;font-size:13px;margin-bottom:16px;line-height:1.5;}
    .fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:700px){.fi-grid{grid-template-columns:1fr;}}
    .fi-group label{font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:4px;}
    .fi-group input,.fi-group select,.fi-group textarea{width:100%;padding:9px 10px;border:1.5px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit;box-sizing:border-box;}
    .fi-full{grid-column:1/-1;}
    .fi-alerta{padding:10px 14px;border-radius:7px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;}
    .fi-alerta.ok{background:#d4edda;color:#1a7a3a;display:block;}
    .fi-alerta.error{background:#f8d7da;color:#842029;display:block;}
    .btn-fl{background:#004d3d;color:#fff;border:none;padding:12px 22px;border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;}
    .btn-fl:hover{background:#006b55;}
    .btn-fl:disabled{opacity:.6;cursor:wait;}
    .btn-fl.sec{background:#b8860b;}
    .panel{display:none;}
    .panel.on{display:block;}
    .rrhh-box{background:#f4f8f5;border:1.5px solid #cfdad2;border-radius:8px;padding:12px;font-size:13px;min-height:42px;}
    .result-ok{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:16px;margin-top:12px;}
    .nro-big{font-size:22px;font-weight:900;color:#004d3d;letter-spacing:1px;}
    .badge-sit{display:inline-block;padding:3px 10px;border-radius:6px;color:#fff;font-size:12px;font-weight:700;}
    .fl-note{margin-top:14px;font-size:12.5px;color:#666;line-height:1.5;background:#fffdf5;border:1px solid #e8d9a8;border-radius:10px;padding:12px;}
    .fl-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;padding:16px;}
    .fl-modal-bg.on{display:flex;}
    .fl-modal{background:#fff;border-radius:12px;padding:22px;max-width:440px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25);}
    .fl-modal h3{margin:0 0 14px;color:#004d3d;font-size:16px;}
    .fl-modal .fi-group{margin-bottom:12px;}
    .fl-modal-actions{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;}
    .btn-fl.ghost{background:#e8f0ec;color:#004d3d;}
  </style>
</head>
<body class="body-portal">
<div class="header-social-portal">
  <div class="container portal-flex">
    <div class="social-buttons-group">
      <a href="https://www.facebook.com/region.policial.callao.2025" target="_blank" class="btn-pnp-social fb"><i class="fab fa-facebook"></i> Facebook</a>
      <a href="https://www.tiktok.com/@regionpolicialcallao" target="_blank" class="btn-pnp-social tk"><i class="fab fa-tiktok"></i> TikTok</a>
      <a href="https://wa.me/51980122452" target="_blank" class="btn-pnp-social wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </div>
  </div>
</div>
<header class="main-header">
  <div class="container header-flex">
    <div class="logo-container">
      <img src="img/regpol-callao.jpg" alt="Escudo REGPOL Callao" class="logo-pnp" width="90" height="90">
    </div>
    <div class="title-text">
      <h1 class="portal-eslogan">REGI&#211;N POLICIAL CALLAO</h1>
      <p class="portal-subtitulo">RR.HH. — FALTOS</p>
    </div>
  </div>
</header>
<nav class="nav-main"><div class="container"><ul></ul></div></nav>

<main class="fl-wrap">
  <div class="fl-tabs">
    <button type="button" class="fl-tab on" id="tab-reg" onclick="mostrarPanel('reg')"><i class="fas fa-user-clock"></i> Registrar falto</button>
    <button type="button" class="fl-tab" id="tab-con" onclick="mostrarPanel('con')"><i class="fas fa-search"></i> Consultar</button>
    <a href="index.html" style="margin-left:auto;align-self:center;font-size:13px;color:#004d3d;font-weight:600;"><i class="fas fa-arrow-left"></i> Volver</a>
  </div>

  <!-- REGISTRAR (unidades, como descansos médicos) -->
  <div id="panel-reg" class="panel on">
    <div class="fl-card">
      <h2><i class="fas fa-user-clock"></i> Registro de falto</h2>
      <div id="reg-alerta" class="fi-alerta"></div>
      <form id="form-fl" onsubmit="enviarFalto(event)">
        <div class="fi-grid">
          <div class="fi-group"><label>CIP del efectivo *</label>
            <input id="fl-cip" required inputmode="numeric" maxlength="12" placeholder="Ej. 12345678" onblur="rellenarDesdeRrhh()"></div>
          <div class="fi-group"><label>Grado *</label>
            <select id="fl-grado" required></select></div>
          <div class="fi-group"><label>Apellido paterno *</label>
            <input id="fl-apepat" required maxlength="100" placeholder="Apellido paterno"></div>
          <div class="fi-group"><label>Apellido materno</label>
            <input id="fl-apemat" maxlength="100" placeholder="Apellido materno"></div>
          <div class="fi-group fi-full"><label>Nombres *</label>
            <input id="fl-nombres" required maxlength="150" placeholder="Nombres"></div>
          <div class="fi-group"><label>Unidad *</label>
            <select id="fl-unidad" required><option value="">— Seleccionar —</option></select></div>
          <div class="fi-group"><label>Cargo *</label>
            <select id="fl-cargo" required>
              <option value="">— Seleccionar —</option>
              <option value="ADMINISTRATIVO">ADMINISTRATIVO</option>
              <option value="PATRULLAJE">PATRULLAJE</option>
              <option value="INVESTIGACIÓN">INVESTIGACIÓN</option>
              <option value="JEFE DE UNIDAD">JEFE DE UNIDAD</option>
            </select></div>
          <div class="fi-group"><label>Área *</label>
            <select id="fl-area" required onchange="if(typeof regpolToggleAreaOtro==='function')regpolToggleAreaOtro('fl-area','fl-area-otro-box','fl-area-otro')"></select>
            <div id="fl-area-otro-box" style="display:none;margin-top:8px;">
              <input type="text" id="fl-area-otro" maxlength="120" placeholder="Especifique el área...">
            </div>
          </div>
          <div class="fi-group"><label>Inicio de labor (fecha y hora) *</label>
            <input type="datetime-local" id="fl-inicio" required></div>
          <div class="fi-group fi-full"><label>Observación</label>
            <input id="fl-obs" maxlength="500" placeholder="Opcional"></div>
        </div>
        <div style="margin-top:16px;text-align:center;">
          <button type="submit" class="btn-fl" id="btn-reg"><i class="fas fa-save"></i> REGISTRAR FALTO</button>
        </div>
      </form>
      <div id="reg-comprobante" style="display:none;"></div>
    </div>
  </div>

  <!-- CONSULTAR -->
  <div id="panel-con" class="panel">
    <div class="fl-card">
      <h2><i class="fas fa-search"></i> Consultar falto</h2>
      <div id="con-alerta" class="fi-alerta"></div>
      <form onsubmit="consultarFalto(event)">
        <div class="fi-grid">
          <div class="fi-group"><label>CIP *</label>
            <input id="con-cip" required inputmode="numeric" maxlength="12"></div>
          <div class="fi-group"><label>Nº de registro *</label>
            <input id="con-numero" required maxlength="20" placeholder="F20260001" style="text-transform:uppercase;"></div>
        </div>
        <div style="margin-top:14px;">
          <button type="submit" class="btn-fl"><i class="fas fa-search"></i> CONSULTAR</button>
        </div>
      </form>
      <div id="con-resultado"></div>
    </div>
  </div>
</main>

<!-- Modal: actualizar situación desde consulta -->
<div id="fl-modal-sit" class="fl-modal-bg" onclick="if(event.target===this)cerrarModalSit()">
  <div class="fl-modal" role="dialog" aria-modal="true" aria-labelledby="fl-modal-tit">
    <h3 id="fl-modal-tit"><i class="fas fa-exchange-alt"></i> Situación</h3>
    <div id="sit-alerta" class="fi-alerta"></div>
    <form id="form-sit-modal" onsubmit="guardarSituacionModal(event)">
      <input type="hidden" id="sit-cip">
      <input type="hidden" id="sit-numero">
      <div class="fi-group">
        <label>Reincorporación (fecha y hora) *</label>
        <input type="datetime-local" id="sit-inicio" required>
      </div>
      <div class="fi-group">
        <label>Observación (motivo) *</label>
        <textarea id="sit-obs" required maxlength="500" rows="3" placeholder="Describa el motivo"></textarea>
      </div>
      <div class="fl-modal-actions">
        <button type="submit" class="btn-fl sec" id="btn-sit"><i class="fas fa-check"></i> GUARDAR</button>
        <button type="button" class="btn-fl ghost" onclick="cerrarModalSit()">Cerrar</button>
      </div>
    </form>
  </div>
</div>

<footer class="portal-footer">
  <div class="container"><p>REGPOL CALLAO — UNITIC</p></div>
</footer>
<script src="areas-labor.js?v=2"></script>
<script src="portal-data.js?v=10"></script>
<script src="portal.js?v=82"></script>
<script>
var API = (typeof regpolApiBase === 'function') ? regpolApiBase() : (window.REGPOL_API_BASE || '');
var GRADOS_FL = [
  'CORONEL PNP','COMANDANTE PNP','MAYOR PNP','CAPITAN PNP','TENIENTE PNP','ALFEREZ PNP',
  'SUPERIOR PNP','BRIGADIER PNP','TECNICO DE 1RA PNP','TECNICO DE 2DA PNP','TECNICO DE 3RA PNP',
  'SUBOFICIAL DE 1RA PNP','SUBOFICIAL DE 2DA PNP','SUBOFICIAL DE 3RA PNP'
];

initPortalPagina({ activeNav: 'rrhh' });

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmt(v) {
  if (!v) return '—';
  try { return new Date(v).toLocaleString('es-PE', { dateStyle: 'short', timeStyle: 'short' }); }
  catch (e) { return String(v); }
}
function colorSit(s) {
  if (s === 'TARDE') return '#b8860b';
  if (s === 'ABANDONO') return '#c0392b';
  return '#004d3d';
}
function alerta(id, ok, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.className = 'fi-alerta ' + (ok ? 'ok' : 'error');
  el.textContent = msg || '';
  el.style.display = msg ? 'block' : 'none';
}
function fichaHtml(f) {
  return '<div class="result-ok">'
    + '<div style="text-align:center;margin-bottom:10px;"><div style="font-size:11px;color:#666;">Nº DE REGISTRO</div>'
    + '<div class="nro-big">' + esc(f.numero_registro) + '</div></div>'
    + '<div style="font-size:13px;line-height:1.7;">'
    + '<strong>' + esc(f.apellidos_nombres) + '</strong><br>'
    + 'CIP: ' + esc(f.cip) + ' · ' + esc(f.grado || '') + '<br>'
    + 'Unidad: ' + esc(f.unidad) + (f.division ? ' · ' + esc(f.division) : '') + '<br>'
    + (f.cargo ? ('Cargo: ' + esc(f.cargo) + '<br>') : '')
    + (f.area ? ('Área: ' + esc(f.area) + '<br>') : '')
    + 'Inicio labor: ' + esc(fmt(f.inicio_labor)) + '<br>'
    + 'Situación: <span class="badge-sit" style="background:' + colorSit(f.situacion) + ';">' + esc(f.situacion) + '</span><br>'
    + (f.reincorporacion ? ('Reincorporación: ' + esc(fmt(f.reincorporacion)) + '<br>') : '')
    + '</div></div>';
}

function toLocalInput(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  function pad(n) { return String(n).padStart(2, '0'); }
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate())
    + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function mostrarPanel(cual) {
  ['reg', 'con'].forEach(function(p) {
    var pan = document.getElementById('panel-' + p);
    var tab = document.getElementById('tab-' + p);
    if (pan) pan.classList.toggle('on', p === cual);
    if (tab) tab.classList.toggle('on', p === cual);
  });
  if (history.replaceState) {
    history.replaceState(null, '', 'faltos.html' + (cual === 'con' ? '#consulta' : ''));
  }
}

function abrirModalSit(f) {
  document.getElementById('sit-cip').value = f.cip || '';
  document.getElementById('sit-numero').value = f.numero_registro || '';
  document.getElementById('sit-inicio').value = toLocalInput(f.reincorporacion) || '';
  document.getElementById('sit-obs').value = f.observacion || '';
  alerta('sit-alerta', true, '');
  document.getElementById('sit-alerta').style.display = 'none';
  document.getElementById('fl-modal-sit').classList.add('on');
  document.getElementById('sit-inicio').focus();
}

function cerrarModalSit() {
  document.getElementById('fl-modal-sit').classList.remove('on');
}

/** Cruce RR.HH. en segundo plano: rellena campos del formulario sin panel visible. */
async function rellenarDesdeRrhh() {
  var cip = (document.getElementById('fl-cip').value || '').trim();
  if (!cip || cip.replace(/\D/g, '').length < 6) return;
  try {
    var r = await fetch(API + '/portal/faltos/rrhh-lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cip: cip })
    });
    var d = await r.json();
    if (!d.ok || !d.personal) return;
    var p = d.personal;
    var apePat = document.getElementById('fl-apepat');
    var apeMat = document.getElementById('fl-apemat');
    var nom = document.getElementById('fl-nombres');
    var gra = document.getElementById('fl-grado');
    var uni = document.getElementById('fl-unidad');
    if (p.apellidos_nombres && apePat && !apePat.value) {
      var raw = String(p.apellidos_nombres).trim();
      var partes = raw.split(',');
      if (partes.length >= 2) {
        var apes = partes[0].trim().split(/\s+/);
        apePat.value = apes[0] || '';
        if (apeMat && apes.length > 1) apeMat.value = apes.slice(1).join(' ');
        if (nom && !nom.value) nom.value = partes.slice(1).join(',').trim();
      } else if (nom && !nom.value) {
        nom.value = raw;
      }
    }
    if (gra && p.grado) {
      var found = false;
      for (var i = 0; i < gra.options.length; i++) {
        if (gra.options[i].value === p.grado) { gra.value = p.grado; found = true; break; }
      }
      if (!found && p.grado) {
        var o = document.createElement('option');
        o.value = p.grado; o.textContent = p.grado;
        gra.appendChild(o);
        gra.value = p.grado;
      }
    }
    if (uni && p.unidad) {
      var ok = false;
      for (var j = 0; j < uni.options.length; j++) {
        if (uni.options[j].value === p.unidad) { uni.value = p.unidad; ok = true; break; }
      }
      if (!ok) {
        var ou = document.createElement('option');
        ou.value = p.unidad; ou.textContent = p.unidad;
        uni.appendChild(ou);
        uni.value = p.unidad;
      }
    }
  } catch (e) { /* silencioso */ }
}

async function enviarFalto(ev) {
  ev.preventDefault();
  var btn = document.getElementById('btn-reg');
  btn.disabled = true;
  document.getElementById('reg-comprobante').style.display = 'none';
  var area = (typeof regpolObtenerArea === 'function')
    ? regpolObtenerArea('fl-area', 'fl-area-otro')
    : (document.getElementById('fl-area').value || '');
  try {
    var r = await fetch(API + '/portal/faltos/registrar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cip: document.getElementById('fl-cip').value,
        grado: document.getElementById('fl-grado').value,
        apellido_paterno: document.getElementById('fl-apepat').value,
        apellido_materno: document.getElementById('fl-apemat').value,
        nombres: document.getElementById('fl-nombres').value,
        unidad: document.getElementById('fl-unidad').value,
        cargo: document.getElementById('fl-cargo').value,
        area: area,
        inicio_labor_datetime: document.getElementById('fl-inicio').value,
        observacion: document.getElementById('fl-obs').value
      })
    });
    var d = await r.json();
    if (!d.ok) {
      alerta('reg-alerta', false, d.error || 'Error al registrar');
      btn.disabled = false;
      return;
    }
    alerta('reg-alerta', true, d.mensaje || 'Registrado. Conserve el Nº de registro.');
    var box = document.getElementById('reg-comprobante');
    box.style.display = 'block';
    box.innerHTML = fichaHtml(d.falto);
    document.getElementById('form-fl').reset();
    if (typeof regpolToggleAreaOtro === 'function') regpolToggleAreaOtro('fl-area', 'fl-area-otro-box', 'fl-area-otro');
  } catch (e) {
    alerta('reg-alerta', false, 'Error de conexión');
  }
  btn.disabled = false;
}

async function consultarFalto(ev) {
  ev.preventDefault();
  document.getElementById('con-resultado').innerHTML = '';
  alerta('con-alerta', true, '');
  document.getElementById('con-alerta').style.display = 'none';
  try {
    var r = await fetch(API + '/portal/faltos/consultar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cip: document.getElementById('con-cip').value,
        numero_registro: document.getElementById('con-numero').value
      })
    });
    var d = await r.json();
    if (!d.ok) { alerta('con-alerta', false, d.error || 'No encontrado'); return; }
    abrirModalSit(d.falto);
  } catch (e) {
    alerta('con-alerta', false, 'Error de conexión');
  }
}

async function guardarSituacionModal(ev) {
  ev.preventDefault();
  var btn = document.getElementById('btn-sit');
  btn.disabled = true;
  try {
    var r = await fetch(API + '/portal/faltos/actualizar-situacion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        cip: document.getElementById('sit-cip').value,
        numero_registro: document.getElementById('sit-numero').value,
        reincorporacion_datetime: document.getElementById('sit-inicio').value,
        observacion: document.getElementById('sit-obs').value
      })
    });
    var d = await r.json();
    if (!d.ok) {
      alerta('sit-alerta', false, d.error || 'No se pudo actualizar');
      btn.disabled = false;
      return;
    }
    alerta('sit-alerta', true, 'Guardado');
    setTimeout(function() {
      cerrarModalSit();
      alerta('con-alerta', true, 'Situación actualizada');
      document.getElementById('con-resultado').innerHTML = '';
    }, 600);
  } catch (e) {
    alerta('sit-alerta', false, 'Error de conexión');
  }
  btn.disabled = false;
}

async function initFormulario() {
  var selG = document.getElementById('fl-grado');
  selG.innerHTML = '<option value="">— Seleccionar —</option>'
    + GRADOS_FL.map(function(g){ return '<option value="'+esc(g)+'">'+esc(g)+'</option>'; }).join('');
  if (typeof regpolPoblarSelectArea === 'function') regpolPoblarSelectArea(document.getElementById('fl-area'));

  var sel = document.getElementById('fl-unidad');
  try {
    var cfg = await fetch(API + '/config').then(function(r){ return r.json(); });
    sel.innerHTML = '<option value="">— Seleccionar unidad —</option>';
    (cfg.divisiones || []).forEach(function(d) {
      var og = document.createElement('optgroup');
      og.label = d.nombre || 'Sin división';
      (d.unidades || []).forEach(function(u) {
        var nom = typeof u === 'string' ? u : (u.nombre || '');
        if (!nom) return;
        var o = document.createElement('option');
        o.value = nom; o.textContent = nom;
        og.appendChild(o);
      });
      if (og.children.length) sel.appendChild(og);
    });
  } catch (e) { /* ignore */ }

  // Preferir catálogo de descansos si existe
  try {
    var cat = await fetch(API + '/portal/descansos/catalogos').then(function(r){ return r.json(); });
    if (cat && cat.grados_efectivo && cat.grados_efectivo.length) {
      selG.innerHTML = '<option value="">— Seleccionar —</option>'
        + cat.grados_efectivo.map(function(g){ return '<option value="'+esc(g)+'">'+esc(g)+'</option>'; }).join('');
    }
  } catch (e2) { /* ignore */ }
}

(function initHash() {
  var h = (location.hash || '').toLowerCase();
  if (h.indexOf('consulta') >= 0 || h.indexOf('situacion') >= 0 || h.indexOf('situación') >= 0) {
    mostrarPanel('con');
  } else {
    mostrarPanel('reg');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') cerrarModalSit();
  });
  initFormulario();
})();
</script>
</body>
</html>
