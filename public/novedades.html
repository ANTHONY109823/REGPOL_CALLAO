<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novedades - REGPOL CALLAO</title>
  <link rel="stylesheet" href="style.css?v=29">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    /* SORTEOS */
    .sorteos-section { margin: 32px 0; }
    .sorteos-section-titulo {
      display: flex; align-items: center; gap: 10px;
      color: #004d3d; font-size: 15px; font-weight: 800;
      letter-spacing: .5px; text-transform: uppercase;
      border-bottom: 3px solid #c8a94a; padding-bottom: 10px; margin-bottom: 18px;
    }
    .sorteos-section-titulo i { color: #c8a94a; font-size: 18px; }
    .sorteos-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 18px; }
    .sorteo-flyer { border-radius: 14px; overflow: hidden; box-shadow: 0 4px 18px rgba(0,77,61,.15); border: 2px solid #c8a94a; background: #fff; display: flex; flex-direction: column; }
    .sorteo-flyer-img { height: 180px; background: linear-gradient(135deg,#002d24,#004d3d); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .sorteo-flyer-img img { width: 100%; height: 100%; object-fit: cover; }
    .sorteo-placeholder { text-align: center; color: rgba(255,255,255,.7); }
    .sorteo-placeholder i { font-size: 48px; display: block; margin-bottom: 8px; color: #c8a94a; }
    .sorteo-flyer-badge { position: absolute; top: 10px; right: 10px; background: #c8a94a; color: #002d24; font-size: 9px; font-weight: 900; letter-spacing: 1px; padding: 3px 9px; border-radius: 10px; text-transform: uppercase; }
    .sorteo-flyer-body { padding: 16px 18px 18px; flex: 1; }
    .sorteo-flyer-fecha { font-size: 11px; font-weight: 800; color: #c8a94a; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 6px; }
    .sorteo-flyer-titulo { font-size: 15px; font-weight: 800; color: #004d3d; margin-bottom: 6px; }
    .sorteo-flyer-desc { font-size: 12.5px; color: #555; line-height: 1.5; }
    /* RESULTADOS */
    .resultado-card { background: #fff; border-radius: 12px; border: 1.5px solid #c8e6c9; overflow: hidden; box-shadow: 0 2px 10px rgba(0,77,61,.08); margin-bottom: 18px; }
    .resultado-header { background: linear-gradient(90deg,#004d3d,#006b55); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .resultado-header i { font-size: 22px; color: #c8a94a; flex-shrink: 0; }
    .resultado-header-info strong { display: block; font-size: 14px; font-weight: 800; }
    .resultado-header-info span { font-size: 11.5px; opacity: .8; }
    .resultado-tabla { width: 100%; border-collapse: collapse; font-size: 13px; }
    .resultado-tabla th { background: #f0f7f0; color: #004d3d; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .5px; padding: 8px 14px; text-align: left; }
    .resultado-tabla td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; }
    .resultado-tabla tr:last-child td { border: none; }
    .resultado-tabla tr:nth-child(even) td { background: #f8faf8; }
    .resultado-nro { width: 36px; height: 36px; background: #c8a94a; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: #002d24; }
    .resultado-nombre { font-weight: 700; color: #004d3d; }
    .resultado-unidad { font-size: 11.5px; color: #888; }
    .vacio-msg { text-align: center; padding: 36px; color: #bbb; font-size: 13px; }

    /* MODAL NOVEDAD */
    #modal-novedad {
      display: none; position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.65); align-items: center; justify-content: center;
      padding: 16px;
    }
    #modal-novedad.visible { display: flex; }
    .modal-nov-box {
      background: #fff; border-radius: 16px; width: 100%; max-width: 720px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      animation: fadeInUp .25s ease;
    }
    @keyframes fadeInUp { from { transform: translateY(30px); opacity:0; } to { transform: none; opacity:1; } }
    .modal-nov-close {
      position: sticky; top: 0; z-index: 2; display: flex; justify-content: flex-end;
      padding: 12px 14px 0; background: #fff;
    }
    .modal-nov-close button {
      background: #f0f0f0; border: none; border-radius: 50%; width: 34px; height: 34px;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #555; transition: background .15s;
    }
    .modal-nov-close button:hover { background: #e0e0e0; }
    .modal-nov-hero { width: 100%; height: 240px; overflow: hidden; }
    .modal-nov-hero img { width: 100%; height: 100%; object-fit: cover; }
    #modal-nov-inner { padding: 20px 28px 28px; }
    .modal-nov-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .modal-nov-fecha { font-size: 12px; color: #888; }
    .modal-nov-titulo { font-size: 1.35rem; font-weight: 900; color: #004d3d; margin-bottom: 16px; line-height: 1.3; }
    .modal-nov-cuerpo { font-size: 14.5px; color: #444; line-height: 1.75; }
    .modal-nov-cuerpo p { margin-bottom: 12px; }
  </style>
</head>
<body class="body-portal">

<div class="header-social-portal">
  <div class="container portal-flex">
    <a href="panel-admin.html" target="_blank" rel="noopener noreferrer" class="btn-pnp-social ingresar"
       onclick="window.open('panel-admin.html','regpol_panel_unitic','noopener,noreferrer');return false;">
      <i class="fas fa-sign-in-alt"></i> INGRESAR
    </a>
    <div class="social-buttons-group">
      <a href="https://www.facebook.com/region.policial.callao.2025" target="_blank" class="btn-pnp-social fb"><i class="fab fa-facebook"></i> Facebook</a>
      <a href="https://www.tiktok.com/@regionpolicialcallao" target="_blank" class="btn-pnp-social tk"><i class="fab fa-tiktok"></i> TikTok</a>
      <a href="https://wa.me/51927577686" target="_blank" class="btn-pnp-social wa"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </div>
  </div>
</div>

<header class="main-header">
  <div class="container header-flex">
    <div class="logo-container">
      <img src="img/regpol-callao.jpg" alt="Escudo REGPOL Callao" class="logo-pnp" width="90" height="90">
    </div>
    <div class="title-text">
      <h1 class="portal-eslogan">REGIÓN POLICIAL CALLAO</h1>
      <p class="portal-subtitulo">UNIDAD DE TECNOLOGIAS DE LA INFORMACION Y COMUNICACIONES</p>
    </div>
  </div>
</header>

<nav class="nav-main"><div class="container"><ul></ul></div></nav>

<main class="container content-area">

  <!-- PRÓXIMOS SORTEOS -->
  <div id="seccion-proximos" class="sorteos-section" style="display:none;">
    <div class="sorteos-section-titulo">
      <i class="fas fa-calendar-star"></i> PRÓXIMOS SORTEOS Y CONVOCATORIAS
    </div>
    <div class="sorteos-grid" id="grid-proximos"></div>
  </div>

  <!-- NOVEDADES INSTITUCIONALES -->
  <div id="lista-novedades"></div>

  <!-- RESULTADOS DE SORTEOS -->
  <div id="seccion-resultados" class="sorteos-section" style="display:none;">
    <div class="sorteos-section-titulo">
      <i class="fas fa-trophy"></i> RESULTADOS DE SORTEOS / SELECCIONADOS
    </div>
    <div id="lista-resultados"></div>
  </div>

</main>

<!-- MODAL DETALLE NOVEDAD -->
<div id="modal-novedad" onclick="if(event.target===this)cerrarNovedadModal()">
  <div class="modal-nov-box">
    <div class="modal-nov-close">
      <button onclick="cerrarNovedadModal()" title="Cerrar"><i class="fas fa-times"></i></button>
    </div>
    <div id="modal-nov-inner"></div>
  </div>
</div>

<footer class="portal-footer">
  <p>&copy; 2026 Región Policial Callao - UNITIC | Todos los derechos reservados | Ing. Anthony Ccayo</p>
</footer>

<script src="portal-data.js?v=4"></script>
<script src="portal.js?v=21"></script>
<script>
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

initPortalPagina({ activeNav: 'novedades', renderNovedades: 'lista-novedades' });

document.addEventListener('keydown', function(e){ if(e.key==='Escape') cerrarNovedadModal(); });

fetch((apiBasePortal() || '') + '/portal/sorteos')
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(!d.ok) return;
    var proximos   = (d.sorteos||[]).filter(function(s){ return s.tipo==='proximo'; });
    var resultados = (d.sorteos||[]).filter(function(s){ return s.tipo==='resultado'; });
    renderProximos(proximos);
    renderResultados(resultados);
  })
  .catch(function(){});

function renderProximos(list){
  if(!list.length) return;
  document.getElementById('seccion-proximos').style.display='';
  document.getElementById('grid-proximos').innerHTML = list.map(function(s){
    var imgHtml = s.imagen
      ? '<img src="'+escH(s.imagen)+'" alt="'+escH(s.titulo)+'"/>'
      : '<div class="sorteo-placeholder"><i class="fas fa-random"></i><span style="font-size:12px;font-weight:700;">PRÓXIMO SORTEO</span></div>';
    return '<div class="sorteo-flyer">'
      +'<div class="sorteo-flyer-img">'+imgHtml
      +'<span class="sorteo-flyer-badge">CONVOCATORIA</span>'
      +'</div>'
      +'<div class="sorteo-flyer-body">'
      +(s.fecha_sorteo?'<div class="sorteo-flyer-fecha"><i class="fas fa-calendar-alt"></i> '+escH(s.fecha_sorteo)+'</div>':'')
      +'<div class="sorteo-flyer-titulo">'+escH(s.titulo)+'</div>'
      +(s.descripcion?'<div class="sorteo-flyer-desc">'+escH(s.descripcion)+'</div>':'')
      +(s.item_titulo?'<div style="margin-top:8px;font-size:11px;color:#004d3d;font-weight:700;"><i class="fas fa-link"></i> Ref: '+escH(s.item_titulo)+'</div>':'')
      +'</div></div>';
  }).join('');
}

function renderResultados(list){
  if(!list.length) return;
  document.getElementById('seccion-resultados').style.display='';
  document.getElementById('lista-resultados').innerHTML = list.map(function(s){
    var filas = (s.resultados||[]).map(function(r,i){
      return '<tr>'
        +'<td style="text-align:center;"><span class="resultado-nro">'+(i+1)+'</span></td>'
        +'<td><div class="resultado-nombre">'+escH(r.nombres)+'</div>'
        +(r.cip?'<div style="font-size:10.5px;color:#aaa;">CIP: '+escH(r.cip)+'</div>':'')+'</td>'
        +'<td><div class="resultado-unidad">'+escH(r.unidad||'')+'</div>'
        +(r.cargo?'<div style="font-size:10.5px;color:#aaa;">'+escH(r.cargo)+'</div>':'')+'</td>'
        +'</tr>';
    }).join('');
    return '<div class="resultado-card">'
      +'<div class="resultado-header">'
      +'<i class="fas fa-trophy"></i>'
      +'<div class="resultado-header-info">'
      +'<strong>'+escH(s.titulo)+'</strong>'
      +(s.fecha_sorteo?'<span><i class="fas fa-calendar-alt"></i> '+escH(s.fecha_sorteo)+'</span>':'')
      +'</div></div>'
      +(s.descripcion?'<div style="padding:10px 20px;font-size:12.5px;color:#666;background:#f7faf7;">'+escH(s.descripcion)+'</div>':'')
      +(filas
        ? '<table class="resultado-tabla"><thead><tr><th>#</th><th>Nombres y Apellidos</th><th>Unidad</th></tr></thead><tbody>'+filas+'</tbody></table>'
        : '<p class="vacio-msg">Resultados pendientes de publicación.</p>')
      +'</div>';
  }).join('');
}
</script>
</body>
</html>
