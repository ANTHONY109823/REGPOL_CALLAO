</head>
<body class="body-cursos">

<div class="header-social-portal">

</div>

<header class="main-header">
  <div class="container header-flex">
    <div class="logo-container">
      <img src="img/regpol-callao.jpg" alt="Escudo REGPOL Callao" class="logo-pnp" width="90" height="90">
    </div>
    <div class="title-text">
      <h1 class="portal-eslogan">REGIÃ“N POLICIAL CALLAO</h1>
      <p class="portal-subtitulo">UNIDAD DE TECNOLOGIAS DE LA INFORMACION Y COMUNICACIONES</p>
    </div>
  </div>
</header>

<nav class="nav-main"><div class="container"><ul></ul></div></nav>

<main class="container content-area">
  <div class="grid-modern" id="grid-cursos"></div>
  <div class="page-intro" id="section-pdf" style="display:none;"><h2>RELACIÃ“N DE SELECCIONADOS</h2></div>
  <div id="lista-pdf-cursos"></div>
</main>

<footer class="portal-footer">
  <p>&copy; 2026 RegiÃ³n Policial Callao - UNITIC | Todos los derechos reservados | Ing. Anthony Ccayo</p>
</footer>

<script src="portal-data.js?v=2"></script>
<script src="portal.js?v=18"></script>
<script>
// 1ï¸âƒ£ Nav + CMS items (portal-data.js â€” siempre han estado aquÃ­)
initPortalPagina({
  activeNav: 'cursos',
  renderCursosPdf: 'lista-pdf-cursos'
});

cargarSiteData().then(function(data){
  if(data && data.cursosPdf && data.cursosPdf.length)
    document.getElementById('section-pdf').style.display='';
  renderGrid(data ? (data.cursos||[]) : []);
});

// 2ï¸âƒ£ Cursos editables desde el panel (items_portal)
var dbCursos = [];
fetch('/portal/items?tipo=curso')
  .then(function(r){return r.json();})
  .then(function(d){ dbCursos = d.ok&&d.items ? d.items : []; renderGrid([]); })
  .catch(function(){});

var cmsCursos = [];
function renderGrid(cms){
  if(cms.length) cmsCursos = cms;
  var el = document.getElementById('grid-cursos');

  var htmlCms = cmsCursos.map(function(item){
    return '<a href="'+escHtml(item.url||'#')+'">'
      +'<div class="card-modern">'
      +'<div class="icon-wrapper" style="background:'+escHtml(item.color||'#004d3d')+';">'
      +'<i class="fas '+escHtml(item.icono||'fa-graduation-cap')+'"></i></div>'
      +'<h4>'+escHtml(item.titulo)+'</h4>'
      +'<p>'+escHtml(item.descripcion||'')+'</p>'
      +'<span style="color:'+escHtml(item.estadoColor||'green')+';font-weight:bold;font-size:12px;">'
      +escHtml(item.estado||'')+'</span>'
      +'</div></a>';
  }).join('');

  var htmlDb = dbCursos.map(function(item){
    var colorEstado = item.estado==='DISPONIBLE'?'#1a7a3a':item.estado==='CERRADO'?'#c0392b':'#856404';
    var inscBadge = item.inscripciones_abiertas
      ? '<span style="display:inline-block;background:#d4edda;color:#1a7a3a;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:4px;">âœ“ Inscripciones abiertas</span>'
      : '';
    return '<a href="detalle.html?id='+item.id+'&tipo=curso">'
      +'<div class="card-modern">'
      +'<div class="icon-wrapper" style="background:'+escHtml(item.color||'#004d3d')+';">'
      +'<i class="fas '+escHtml(item.icono||'fa-graduation-cap')+'"></i></div>'
      +'<h4>'+escHtml(item.titulo)+'</h4>'
      +'<p>'+escHtml(item.descripcion||'')+'</p>'
      +(item.vacantes?'<p style="font-size:12px;color:#666;margin-top:4px;"><i class="fas fa-users" style="margin-right:4px;"></i>'+item.vacantes+' vacantes</p>':'')
      +'<span style="color:'+colorEstado+';font-weight:bold;font-size:12px;">'+escHtml(item.estado)+'</span>'
      +inscBadge
      +'</div></a>';
  }).join('');

  var total = htmlCms + htmlDb;
  el.innerHTML = total || '<p class="texto-vacio">No hay cursos publicados actualmente.</p>';
}
</script>
</body>
</html>
