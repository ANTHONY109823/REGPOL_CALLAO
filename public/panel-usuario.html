<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Panel — REGPOL Callao</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="panel-admin.css?v=13"/>
  <link rel="stylesheet" href="responsive.css?v=1"/>
  <style>
    *{box-sizing:border-box;}
    body{background:#f0f4f0;font-family:'Segoe UI',sans-serif;margin:0;}
    .hdr{background:linear-gradient(135deg,#004d3d,#002d24);color:#fff;padding:13px 24px;
      display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.25);}
    .hdr h1{font-size:15px;margin:0;display:flex;align-items:center;gap:10px;}
    .hdr .oficina-badge{background:rgba(200,169,74,.25);border:1px solid #c8a94a;color:#c8a94a;
      font-size:11px;font-weight:700;padding:2px 10px;border-radius:10px;letter-spacing:.3px;}
    .body{max-width:1200px;margin:20px auto;padding:0 16px;}
    .logout-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);
      color:#fff;padding:5px 13px;border-radius:5px;cursor:pointer;font-size:12px;}
    .user-info{font-size:12px;opacity:.8;margin-right:10px;}
    /* Tabs */
    .tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:0;}
    .tab-btn{padding:9px 18px;border:none;background:#e8f0e8;border-radius:6px 6px 0 0;
      cursor:pointer;font-size:13px;font-weight:600;color:#555;transition:all .2s;}
    .tab-btn:hover{background:#d0e8d0;}
    .tab-btn.on{background:#004d3d;color:#fff;}
    .tab{display:none;} .tab.on{display:block;}
    /* Cards */
    .card{background:#fff;border-radius:0 10px 10px 10px;box-shadow:0 2px 12px rgba(0,77,61,.08);
      padding:22px;margin-bottom:18px;}
    .card h3{color:#004d3d;margin:0 0 14px;font-size:14px;border-bottom:2px solid #c8a94a;padding-bottom:7px;}
    /* Stats */
    .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
    .stat{background:#f0f7f0;border-radius:8px;padding:14px;text-align:center;border:1.5px solid #c8e6c9;}
    .stat .n{font-size:26px;font-weight:800;color:#004d3d;}
    .stat .l{font-size:11px;color:#555;margin-top:3px;}
    /* Tabla */
    .filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
    .filtros input,.filtros select{padding:7px 10px;border:1.5px solid #ccc;border-radius:6px;font-size:12.5px;}
    table.t{width:100%;border-collapse:collapse;font-size:12px;}
    table.t th{background:#004d3d;color:#fff;padding:8px 10px;text-align:left;}
    table.t td{padding:7px 10px;border-bottom:1px solid #eee;}
    table.t tr:nth-child(even){background:#f7faf7;}
    .badge{padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:700;}
    .ok{background:#d4edda;color:#1a7a3a;} .pend{background:#fff3cd;color:#856404;}
    .pag-btn{padding:4px 10px;margin:2px;border:1.5px solid #004d3d;background:#fff;
      color:#004d3d;border-radius:4px;cursor:pointer;font-size:11px;}
    .pag-btn.on{background:#004d3d;color:#fff;}
    /* Botones */
    .btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12.5px;
      font-weight:600;display:inline-flex;align-items:center;gap:5px;}
    .btn-v{background:#004d3d;color:#fff;} .btn-v:hover{background:#006b55;}
    .btn-r{background:#c0392b;color:#fff;} .btn-r:hover{background:#a93226;}
    .btn-a{background:#2980b9;color:#fff;} .btn-a:hover{background:#2471a3;}
    /* CMS embebido */
    .cms-tab-btn{padding:7px 14px;border:none;background:#e8f0e8;border-radius:5px 5px 0 0;
      cursor:pointer;font-size:12px;font-weight:600;color:#555;margin-right:3px;}
    .cms-tab-btn.activo{background:#004d3d;color:#fff;}
    /* Sin acceso */
    .sin-acceso{text-align:center;padding:60px 20px;color:#bbb;}
    @media (max-width: 768px) {
      .hdr { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
      .hdr h1 { font-size: 13px; }
      .body { margin: 12px auto; padding: 0 10px; }
      .tabs { gap: 2px; }
      .tab-btn { padding: 8px 12px; font-size: 12px; flex: 1 1 auto; }
      .card { padding: 16px; border-radius: 8px; }
      .filtros input, .filtros select { flex: 1 1 100%; min-width: 0; }
      table.t { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    }
    .sin-acceso i{font-size:48px;display:block;margin-bottom:16px;}
    .descarga-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
    .descarga-box{border:1.5px solid #c8e6c9;border-radius:8px;padding:14px;}
    .descarga-box strong{color:#004d3d;font-size:13px;display:block;margin-bottom:4px;}
    .descarga-box p{font-size:11.5px;color:#666;margin:4px 0 8px;}
    .descarga-box select{width:100%;padding:7px;margin-bottom:8px;border-radius:5px;
      border:1.5px solid #ccc;font-size:12.5px;}
    .dtab{padding:7px 14px;border:none;background:#e8f0e8;border-radius:6px;
      cursor:pointer;font-size:12px;font-weight:600;color:#555;transition:all .15s;
      display:inline-flex;align-items:center;gap:5px;}
    .dtab:hover{background:#c8e6c9;} .dtab.on{background:#004d3d;color:#fff;}
    .btn-r{background:#c0392b;color:#fff;} .btn-r:hover{background:#a93226;}
    .btn-a{background:#2980b9;color:#fff;} .btn-a:hover{background:#2471a3;}
    /* Bienvenida */
    .bienvenida{background:linear-gradient(135deg,#004d3d,#006b55);color:#fff;border-radius:10px;
      padding:24px;margin-bottom:18px;display:flex;align-items:center;gap:20px;}
    .bienvenida i{font-size:40px;opacity:.7;}
    .bienvenida h2{margin:0 0 4px;font-size:18px;}
    .bienvenida p{margin:0;font-size:13px;opacity:.85;}
    .perm-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
    .perm-chip{background:rgba(200,169,74,.3);border:1px solid #c8a94a;color:#fff;
      font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600;}
    .dash-box{border:1.5px solid #c8e6c9;border-radius:8px;overflow:hidden;}
    .dash-head{background:#004d3d;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;}
    .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-top:12px;}
    .ult-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee;font-size:12px;}
    .ult-item:last-child{border-bottom:none;}
    .ult-nom{font-weight:600;color:#004d3d;}
    .ult-meta{color:#888;font-size:11px;}
  </style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>
      <i class="fas fa-shield-alt"></i>
      <span id="ph-nombre">Panel</span>
      <span class="oficina-badge" id="ph-oficina"></span>
    </h1>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="user-info" id="ph-usuario"></span>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
  </div>
</div>

<div class="body" id="panel-body">
  <div style="text-align:center;padding:60px;color:#bbb;">
    <i class="fas fa-spinner fa-spin" style="font-size:32px;"></i>
    <p style="margin-top:12px;">Cargando panel...</p>
  </div>
</div>

<script src="api-config.js?v=2"></script>
<script src="portal-data.js?v=2"></script>
<script src="portal.js?v=28"></script>
<script src="divisiones-ui.js?v=4"></script>
<script src="panel-cms.js?v=13"></script>
<script>
var API = (typeof regpolApiBase === 'function') ? regpolApiBase() : (window.REGPOL_API_BASE || '');
var SESSION = null;
var TOKEN   = '';

// ── Secciones disponibles ──────────────────────────────────────────────────────
var SECCIONES = [
  { id:'evaluaciones',   icono:'fa-clipboard-list', label:'Evaluaciones',       tipo:'evaluaciones' },
  { id:'descargas',      icono:'fa-download',        label:'Descargas',          tipo:'descargas'    },
  { id:'cms_novedades',  icono:'fa-newspaper',       label:'Novedades',          tipo:'cms', cmsTab:'novedades'  },
  { id:'cms_convenios',  icono:'fa-file-contract',   label:'Convenios',          tipo:'cms', cmsTab:'convenios'  },
  { id:'cms_cursos',     icono:'fa-graduation-cap',  label:'Cursos',             tipo:'cms', cmsTab:'cursos'     },
  { id:'cms_inicio',     icono:'fa-home',            label:'Inicio / Carrusel',  tipo:'cms', cmsTab:'carrusel'   },
  { id:'cms_resena',     icono:'fa-landmark',        label:'Reseña Histórica',   tipo:'cms', cmsTab:'resena'     },
  { id:'cms_labor',      icono:'fa-tasks',           label:'Nuestra Labor',      tipo:'cms', cmsTab:'labor'      },
];

// ── Verificar sesión ───────────────────────────────────────────────────────────
function normalizarPermisos(p) {
  if (Array.isArray(p)) return p;
  if (typeof p === 'string') {
    try { return JSON.parse(p); } catch (e) { return []; }
  }
  return [];
}

function permisosDeSesion(saved) {
  var permisos = normalizarPermisos(saved.permisos);
  if (permisos.length) return permisos;
  if (saved.rol === 'bienestar') return ['evaluaciones', 'descargas'];
  return [];
}

function iniciarPanelUsuario() {
  var permisos = permisosDeSesion(SESSION);
  if (!permisos.length) {
    document.getElementById('panel-body').innerHTML = `
      <div class="sin-acceso">
        <i class="fas fa-lock"></i>
        <p>Su cuenta no tiene secciones asignadas.</p>
        <p style="font-size:12px;">Contacte al administrador UNITIC.</p>
      </div>`;
    return;
  }
  construirPanel(permisos);
}

window.addEventListener('DOMContentLoaded', function(){
  var saved = JSON.parse(localStorage.getItem('regpol_session') || 'null');
  if (!saved || !saved.token) { window.location.href='login.html'; return; }
  if (saved.rol === 'unitic' || saved.rol === 'bienestar') { window.location.href='panel-admin.html'; return; }
  var adminPerms = ['cms_cursos','cms_convenios','cms_novedades','cms_resena','cms_labor','cms_inicio','evaluaciones','descargas'];
  var perms = saved.permisos || [];
  for (var i = 0; i < adminPerms.length; i++) {
    if (perms.indexOf(adminPerms[i]) !== -1) { window.location.href='panel-admin.html'; return; }
  }

  SESSION = saved;
  TOKEN   = saved.token;

  document.getElementById('ph-nombre').textContent  = saved.nombre  || 'Usuario';
  document.getElementById('ph-oficina').textContent = saved.nombre  || '';
  document.getElementById('ph-usuario').textContent = saved.usuario || '';

  fetch(API + '/admin/perfil', { headers: { 'x-admin-token': TOKEN } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) {
        logout();
        return;
      }
      SESSION.permisos = normalizarPermisos(d.permisos);
      SESSION.rol      = d.rol || SESSION.rol;
      SESSION.nombre   = d.nombre || SESSION.nombre;
      SESSION.unidad   = d.unidad || '';
      SESSION.usuario  = d.usuario || SESSION.usuario;
      localStorage.setItem('regpol_session', JSON.stringify(SESSION));
      document.getElementById('ph-nombre').textContent  = SESSION.nombre || 'Usuario';
      document.getElementById('ph-oficina').textContent = SESSION.nombre || '';
      document.getElementById('ph-usuario').textContent = SESSION.usuario || '';
      iniciarPanelUsuario();
    })
    .catch(function() {
      logout();
    });
});

function logout() {
  localStorage.removeItem('regpol_session');
  localStorage.removeItem('uniticToken');
  localStorage.removeItem('bienToken');
  window.location.href = 'login.html';
}

function hdr() { return { 'Content-Type':'application/json', 'x-admin-token': TOKEN }; }

function seccionesParaUsuario(permisos) {
  var list = [];
  if (permisos.indexOf('evaluaciones') !== -1) {
    list.push({ id:'dashboard', icono:'fa-chart-pie', label:'Dashboard', tipo:'dashboard' });
  }
  SECCIONES.forEach(function(s) {
    if (permisos.indexOf(s.id) !== -1) list.push(s);
  });
  return list;
}

// ── Construir panel dinámico ───────────────────────────────────────────────────
function construirPanel(permisos) {
  var body     = document.getElementById('panel-body');
  var activas  = seccionesParaUsuario(permisos);

  // Bienvenida
  var chips = activas.map(function(s){
    return '<span class="perm-chip"><i class="fas '+s.icono+'"></i> '+s.label+'</span>';
  }).join('');

  var html = '<div class="bienvenida">'
    +'<i class="fas fa-user-shield"></i>'
    +'<div>'
    +'<h2>Bienvenido, '+(SESSION.nombre||'Usuario')+'</h2>'
    +'<p>REGPOL Callao — Sistema de Administración</p>'
    +'<div class="perm-chips">'+chips+'</div>'
    +'</div></div>';

  // Tabs
  html += '<div class="tabs">';
  activas.forEach(function(s, i){
    html += '<button class="tab-btn'+(i===0?' on':'')+'" onclick="cambiarTab(\''+s.id+'\',this)">'
      +'<i class="fas '+s.icono+'"></i> '+s.label+'</button>';
  });
  html += '</div>';

  // Contenido de cada tab
  activas.forEach(function(s, i){
    html += '<div id="tab-'+s.id+'" class="tab'+(i===0?' on':'')+'">';
    if (s.tipo === 'dashboard') {
      html += renderTabDashboard();
    } else if (s.tipo === 'evaluaciones') {
      html += renderTabEvaluaciones();
    } else if (s.tipo === 'descargas') {
      html += renderTabDescargas();
    } else if (s.tipo === 'cms') {
      html += renderTabCMS(s.cmsTab, s.label);
    }
    html += '</div>';
  });

  body.innerHTML = html;

  // Inicializar primera sección
  if (activas.length) {
    var primera = activas[0];
    if (primera.tipo === 'dashboard') cargarDashboardUsuario();
    else if (primera.tipo === 'evaluaciones') iniciarEvaluaciones();
    else if (primera.tipo === 'descargas') iniciarDescargas();
    else if (primera.tipo === 'cms') { setTimeout(function(){ initCMS(); cambiarTabCMS(primera.cmsTab); }, 100); }
  }
}

function cambiarTab(id, btn) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('on'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('tab-'+id).classList.add('on');
  if (btn) btn.classList.add('on');

  var sec = SECCIONES.find(function(s){ return s.id===id; });
  if (!sec) return;
  if (sec.tipo === 'dashboard') cargarDashboardUsuario();
  else if (sec.tipo === 'evaluaciones') {
    cargarActivacionUsuario();
    iniciarEvaluaciones();
  }
  else if (sec.tipo === 'descargas') iniciarDescargas();
  else if (sec.tipo === 'cms') { if (!window._cmsIniciado){ window._cmsIniciado=true; initCMS(); } cambiarTabCMS(sec.cmsTab); }
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function renderTabDashboard() {
  return '<div class="card">'
    +'<h3><i class="fas fa-chart-pie"></i> Dashboard — métricas de evaluaciones</h3>'
    +'<p style="font-size:12px;color:#666;margin:-6px 0 14px;">Resumen en tiempo real del cuestionario de Bienestar (Oficina de Psicología).</p>'
    +'<div class="stats-row">'
    +'<div class="stat"><div class="n" id="db-total">—</div><div class="l">Total registradas</div></div>'
    +'<div class="stat"><div class="n" id="db-comp" style="color:#1a7a3a;">—</div><div class="l">Completas (566)</div></div>'
    +'<div class="stat"><div class="n" id="db-pend" style="color:#856404;">—</div><div class="l">Parciales enviadas</div></div>'
    +'<div class="stat"><div class="n" id="db-curso" style="color:#c0392b;">—</div><div class="l">En curso sin enviar</div></div>'
    +'</div>'
    +'<div class="dash-grid">'
    +'<div class="dash-box"><div class="dash-head"><i class="fas fa-sitemap"></i> Por división</div>'
    +'<table class="t" style="margin:0;"><tbody id="db-division"><tr><td colspan="2" style="color:#bbb;padding:10px;text-align:center;">Cargando...</td></tr></tbody></table></div>'
    +'<div class="dash-box"><div class="dash-head"><i class="fas fa-building"></i> Top dependencias</div>'
    +'<div style="max-height:280px;overflow-y:auto;"><table class="t" style="margin:0;"><tbody id="db-unidad"><tr><td colspan="2" style="color:#bbb;padding:10px;text-align:center;">Cargando...</td></tr></tbody></table></div></div>'
    +'</div>'
    +'<div class="dash-box" style="margin-top:14px;"><div class="dash-head"><i class="fas fa-clock"></i> Últimas 10 evaluaciones</div>'
    +'<div id="db-ultimas" style="padding:4px 12px 10px;color:#bbb;font-size:12px;text-align:center;">Cargando...</div></div>'
    +'</div>';
}

function cargarDashboardUsuario() {
  fetch(API + '/stats', { headers: hdr() }).then(function(r) { return r.json(); }).then(function(d) {
    if (!d.ok) return;
    var t = d.totalEvaluaciones || 0;
    var c = d.totalCompletas || 0;
    set('db-total', t);
    set('db-comp', c);
    set('db-pend', Math.max(0, t - c));
    set('db-curso', d.totalEnCurso || 0);

    var bdDiv = document.getElementById('db-division');
    if (bdDiv) {
      bdDiv.innerHTML = (d.porDivision || []).length
        ? d.porDivision.map(function(row) {
            return '<tr><td style="padding:6px 10px;font-size:12px;">' + escHtml(row.nombre) + '</td>'
              + '<td style="padding:6px 10px;font-size:12px;font-weight:700;text-align:right;color:#004d3d;">' + row.total + '</td></tr>';
          }).join('')
        : '<tr><td colspan="2" style="color:#bbb;padding:10px;text-align:center;">Sin datos</td></tr>';
    }

    var bdUni = document.getElementById('db-unidad');
    if (bdUni) {
      var unis = (d.porUnidad || []).slice().sort(function(a, b) { return (b.total || 0) - (a.total || 0); }).slice(0, 15);
      bdUni.innerHTML = unis.length
        ? unis.map(function(u) {
            return '<tr><td style="padding:5px 10px;font-size:11.5px;">' + escHtml(u.nombre) + '</td>'
              + '<td style="padding:5px 10px;font-size:12px;font-weight:700;text-align:right;">' + u.total + '</td></tr>';
          }).join('')
        : '<tr><td colspan="2" style="color:#bbb;padding:10px;text-align:center;">Sin datos</td></tr>';
    }

    var ult = document.getElementById('db-ultimas');
    if (ult) {
      ult.innerHTML = (d.ultimasEvaluaciones || []).length
        ? d.ultimasEvaluaciones.map(function(e) {
            var badge = e.completada
              ? '<span class="badge ok">Completo</span>'
              : '<span class="badge pend">Parcial</span>';
            return '<div class="ult-item"><div><span class="ult-nom">' + escHtml(e.nombres) + '</span>'
              + '<span class="ult-meta"> — ' + escHtml(e.unidad || e.comisaria || '—') + '</span></div>'
              + '<div style="display:flex;align-items:center;gap:8px;">' + badge
              + '<span class="ult-meta">' + escHtml(e.fecha) + '</span></div></div>';
          }).join('')
        : '<p style="padding:12px;color:#bbb;text-align:center;">Sin evaluaciones aún.</p>';
    }
  });
}

// ── EVALUACIONES ───────────────────────────────────────────────────────────────
function renderTabEvaluaciones() {
  return '<div class="card">'
    +'<h3><i class="fas fa-building"></i> Activar dependencias para evaluaciones</h3>'
    +'<p style="font-size:12px;color:#666;margin-bottom:10px;">Marque las dependencias habilitadas por división (DIVOPUS 1, 2, 3, DIVUES y UNIDADES ADM. RPC).</p>'
    +'<div id="u-cfg-unidades-list" style="margin-bottom:10px;"></div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">'
    +'<button class="btn btn-v" onclick="guardarActivacionUsuario()"><i class="fas fa-save"></i> Guardar activación</button>'
    +'<button class="btn" style="background:#888;color:#fff;" onclick="marcarTodasUsuario(true)">Marcar todas</button>'
    +'<button class="btn" style="background:#aaa;color:#fff;" onclick="marcarTodasUsuario(false)">Desmarcar</button>'
    +'</div>'
    +'<p style="font-size:12px;color:#004d3d;font-weight:600;">Activas: <span id="u-cfg-activa">—</span></p>'
    +'</div>'
    +'<div class="card">'
    +'<h3><i class="fas fa-search"></i> Listado de evaluaciones</h3>'
    +'<div class="filtros">'
    +'<select id="ev-division" onchange="onFiltroDivisionUsuario()"><option value="">Todas las divisiones</option></select>'
    +'<select id="ev-unidad" onchange="actualizarBotonesEliminarEvalUsuario();cargarEval(1)"><option value="">Todas las unidades</option></select>'
    +'<input id="ev-busq" type="text" placeholder="Nombre / CIP / DNI..." oninput="cargarEval(1)"/>'
    +'<button class="btn btn-v" onclick="cargarEval(1)"><i class="fas fa-sync"></i></button>'
    +'<button class="btn btn-r" id="ev-btn-del-unidad" style="display:none;" onclick="eliminarEvaluacionesUnidadUsuario()"><i class="fas fa-trash-alt"></i> Eliminar por unidad</button>'
    +'</div>'
    +'<div id="ev-info" style="font-size:11.5px;color:#666;margin-bottom:6px;"></div>'
    +'<div style="overflow-x:auto;"><table class="t">'
    +'<thead><tr><th>Nombres</th><th>CIP</th><th>DNI</th><th>Dependencia</th><th>Fecha</th><th>Estado</th><th>PDF</th><th></th></tr></thead>'
    +'<tbody id="ev-body"></tbody>'
    +'</table></div>'
    +'<div id="ev-pag" style="margin-top:8px;"></div>'
    +'</div>';
}

function cargarActivacionUsuario() {
  fetch(API + '/listar', { headers: hdr() }).then(function(r) { return r.json(); }).then(function(d) {
    if (d && d.ok) guardarDivisionesEnVentana(d.divisiones || []);
    return fetch(API + '/config').then(function(r) { return r.json(); });
  }).then(function(d) {
    var activas = (d && d.ok) ? (d.unidadesActivas || []) : [];
    set('u-cfg-activa', activas.length ? activas.join(', ') : 'Ninguna');
    renderCheckboxUsuario(activas);
  });
}

function renderCheckboxUsuario(activas) {
  renderCheckboxesPorDivision('u-cfg-unidades-list', window._divisionesData || [], activas, 'u-cfg-chk');
}

function marcarTodasUsuario(estado) {
  document.querySelectorAll('.u-cfg-chk').forEach(function(c) { c.checked = !!estado; });
}

function guardarActivacionUsuario() {
  var unidades = Array.from(document.querySelectorAll('.u-cfg-chk:checked')).map(function(c) { return c.value; });
  if (!unidades.length) { alert('Seleccione al menos una dependencia.'); return; }
  fetch(API + '/config', {
    method: 'PUT',
    headers: hdr(),
    body: JSON.stringify({ unidadesActivas: unidades })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.ok) {
      set('u-cfg-activa', (d.unidadesActivas || []).join(', '));
      alert('Activación guardada correctamente.');
    } else {
      alert(d.error || 'No se pudo guardar.');
    }
  }).catch(function() { alert('Error de conexión.'); });
}

function iniciarEvaluaciones() {
  cargarActivacionUsuario();
  fetch(API+'/listar',{headers:hdr()}).then(function(r){return r.json();}).then(function(d){
    if(!d.ok) return;
    guardarDivisionesEnVentana(d.divisiones || []);
    llenarSelectDivisiones('ev-division', d.divisiones, 'Todas las divisiones');
    llenarSelectUnidadesAgrupadas('ev-unidad', d.divisiones, 'Todas las unidades');
  });
  if (window._evalIniciado) {
    cargarEval(1);
    return;
  }
  window._evalIniciado = true;
  cargarEval(1);
}

function onFiltroDivisionUsuario() {
  onFiltroDivisionCambio('ev-division', 'ev-unidad', window._divisionesData || [], function() { actualizarBotonesEliminarEvalUsuario(); cargarEval(1); });
}

function actualizarBotonesEliminarEvalUsuario() {
  var btn = document.getElementById('ev-btn-del-unidad');
  if (btn) btn.style.display = (val('ev-unidad') || val('ev-division')) ? '' : 'none';
}

function eliminarRegistroEvalUsuario(id, cip, soloProgreso, nombre) {
  var msg = soloProgreso
    ? '¿Eliminar el avance guardado de ' + nombre + ' (CIP ' + cip + ')?'
    : '¿Eliminar la evaluación de ' + nombre + ' (CIP ' + cip + ')?';
  if (!confirm(msg)) return;
  var url = soloProgreso
    ? API + '/admin/progresos?cip=' + encodeURIComponent(cip)
    : API + '/admin/evaluaciones/' + id;
  fetch(url, { method: 'DELETE', headers: hdr() })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) cargarEval(window._evalPaginaActual || 1);
      else alert(d.error || 'No se pudo eliminar.');
    })
    .catch(function() { alert('Error de conexión.'); });
}

function eliminarEvaluacionesUnidadUsuario() {
  var uni = val('ev-unidad');
  var div = val('ev-division');
  if (!uni && !div) { alert('Seleccione una división o unidad.'); return; }
  var etiqueta = uni || div;
  if (!confirm('¿Eliminar TODAS las evaluaciones y avances de: ' + etiqueta + '?')) return;
  if (!confirm('Confirme de nuevo: se eliminarán todos los registros de "' + etiqueta + '".')) return;
  var q = 'unidad=' + encodeURIComponent(uni) + '&division=' + encodeURIComponent(div);
  fetch(API + '/admin/evaluaciones-lote?' + q, { method: 'DELETE', headers: hdr() })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.ok) {
        alert('Eliminados: ' + (d.eliminados_eval || 0) + ' evaluaciones y ' + (d.eliminados_prog || 0) + ' avances.');
        cargarEval(1);
      } else alert(d.error || 'No se pudo eliminar.');
    })
    .catch(function() { alert('Error de conexión.'); });
}

function btnEliminarEvalUsuario(r) {
  var nom = escJs(r.nombres || '');
  if (r.solo_progreso && r.cip) {
    return '<button type="button" class="btn btn-r" style="font-size:11px;padding:3px 7px;" onclick="eliminarRegistroEvalUsuario(null,\'' + escJs(r.cip) + '\',true,\'' + nom + '\')"><i class="fas fa-trash-alt"></i></button>';
  }
  if (r.id) {
    return '<button type="button" class="btn btn-r" style="font-size:11px;padding:3px 7px;" onclick="eliminarRegistroEvalUsuario(' + r.id + ',\'' + escJs(r.cip || '') + '\',false,\'' + nom + '\')"><i class="fas fa-trash-alt"></i></button>';
  }
  return '';
}

function cargarEval(pag) {
  window._evalPaginaActual = pag;
  actualizarBotonesEliminarEvalUsuario();
  var div=encodeURIComponent(val('ev-division'));
  var uni=encodeURIComponent(val('ev-unidad'));
  var bus=encodeURIComponent(val('ev-busq'));
  fetch(API+'/evaluaciones?pagina='+pag+'&division='+div+'&unidad='+uni+'&busqueda='+bus,{headers:hdr()})
    .then(function(r){return r.json();}).then(function(d){
      if(!d.ok) return;
      set('ev-info', d.rows.length+' de '+d.total+' — Pág '+d.pagina+'/'+d.paginas);
      document.getElementById('ev-body').innerHTML = d.rows.map(function(r){
        var total=parseInt(r.total_resp,10)||0;
        var comp=total>=566 && !r.solo_progreso;
        var badge;
        if(r.solo_progreso){
          badge=total>=566
            ?'<span class="badge" style="background:#fff3cd;color:#856404;">566/566 sin enviar</span>'
            :'<span class="badge pend">'+total+'/566 guardado</span>';
        } else {
          badge=comp?'<span class="badge ok">Completo</span>':'<span class="badge pend">'+total+'/566</span>';
        }
        var pdf = linkPdfEval(r);
        return '<tr'+(r.solo_progreso?' style="background:#fffdf5;"':'')+'><td><strong>'+escHtml(r.nombres)+'</strong></td><td>'+escHtml(r.cip)+'</td><td>'+escHtml(r.dni||'—')+'</td>'
          +'<td style="font-size:11px;">'+escHtml(r.unidad||r.comisaria||'—')+'</td>'
          +'<td style="font-size:11px;">'+escHtml(r.fecha)+'</td><td>'+badge+'</td><td>'+pdf+'</td><td>'+btnEliminarEvalUsuario(r)+'</td></tr>';
      }).join('');
      var pag=document.getElementById('ev-pag'); pag.innerHTML='';
      for(var p=1;p<=d.paginas;p++){
        var b=document.createElement('button');
        b.className='pag-btn'+(p===d.pagina?' on':''); b.textContent=p;
        (function(pp){b.onclick=function(){cargarEval(pp);};})(p);
        pag.appendChild(b);
      }
    });
}

// ── DESCARGAS ─────────────────────────────────────────────────────────────────
var DIV_DATA_U = [];

    +'<tbody id="u-prev-uni-body"></tbody></table></div>'

    +'<input id="u-bus-nom" type="text" placeholder="Nombres..." style="padding:8px 10px;border:1.5px solid #ccc;border-radius:6px;font-size:13px;flex:1;min-width:160px;"/>'

    +'<thead><tr><th>Nombres</th><th>CIP</th><th>Comisaría / Unidad</th><th>Fecha</th><th>Estado</th><th>PDF</th></tr></thead>'
    +'<tbody id="u-bus-res"><tr><td colspan="6" style="text-align:center;color:#bbb;padding:16px;">Ingrese CIP o nombre para buscar.</td></tr></tbody>'

function descTabU(tab, el){
  ['division','unidad','persona'].forEach(function(t){
    document.getElementById('u-dtab-'+t).style.display = t===tab?'':'none';
  });
  document.querySelectorAll('.dtab').forEach(function(b){b.classList.remove('on');});
  if(el) el.classList.add('on');
  if(tab==='division') renderDivCardsU();
}

function renderDivCardsU(){
  var cont=document.getElementById('u-div-cards');
  if(!cont) return;
  if(!DIV_DATA_U.length){
    cont.innerHTML='<p style="color:#bbb;font-size:12px;">Cargando...</p>';
    return;
  }
  cont.innerHTML = DIV_DATA_U.map(function(div){
    return '<div class="descarga-box" style="border-color:#a5d6a7;">'
      +'<strong><i class="fas fa-sitemap" style="color:#004d3d;"></i> '+escHtml(div.nombre)+'</strong>'
      +'<p>'+div.unidades.length+' unidades</p>'
      +'<button class="btn btn-r" style="width:100%;justify-content:center;" '
        +'onclick="window.open(API+\'/pdf/grupo?division=\'+encodeURIComponent(\''+escJs(div.nombre)+'\')+\'&token=\'+encodeURIComponent(TOKEN),\'_blank\')">'
        +'<i class="fas fa-file-pdf"></i> Descargar PDF</button>'
    +'</div>';
  }).join('');
}

function iniciarDescargas() {
  fetch(API+'/listar',{headers:hdr()}).then(function(r){return r.json();}).then(function(d){
    if(!d.ok) return;
    DIV_DATA_U = d.divisiones || [];
    guardarDivisionesEnVentana(d.divisiones || []);
    llenarSelectUnidadesAgrupadas('u-d-uni', DIV_DATA_U, '— Seleccionar unidad —');
    renderDivCardsU();
  });
}

function vistaPreviaDescargaU(filtro, selId, prefijo) {
  var v = val(selId);
  var wrap = document.getElementById(prefijo + '-wrap');
  var body = document.getElementById(prefijo + '-body');
  var info = document.getElementById(prefijo + '-info');
  if (!v) { if (wrap) wrap.style.display = 'none'; return; }
  if (wrap) wrap.style.display = '';
  if (body) body.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#bbb;padding:14px;">Cargando...</td></tr>';
  var q = filtro === 'unidad' ? 'unidad=' : 'comisaria=';
  Promise.all([
    fetch(API + '/evaluaciones?pagina=1&' + q + encodeURIComponent(v) + '&busqueda=', { headers: hdr() }).then(function(r) { return r.json(); }),
    fetch(API + '/admin/avances?' + q + encodeURIComponent(v), { headers: hdr() }).then(function(r) { return r.json(); })
  ]).then(function(results) {
    var d = results[0], av = results[1];
    if (!body) return;
    var filas = [], cipsListos = {};
    (d.ok ? d.rows : []).forEach(function(r) {
      cipsListos[(r.cip || '').toLowerCase()] = true;
      var total = parseInt(r.total_resp, 10) || 0;
      var comp = total >= 566;
      var bloque = parseInt(r.bloque_max, 10) || Math.min(12, Math.ceil(total / 50) || 0);
      filas.push({ nombres: r.nombres, cip: r.cip, dni: r.dni, fecha: r.fecha, bloque: bloque, total: total, comp: comp, id: r.id, enCurso: false });
    });
    (av.ok ? av.rows : []).forEach(function(p) {
      if (cipsListos[(p.cip || '').toLowerCase()]) return;
      filas.push({
        nombres: p.nombres, cip: p.cip, dni: '—', fecha: p.ultima || '—',
        bloque: parseInt(p.bloque, 10) || 1, total: parseInt(p.total, 10) || 0,
        comp: false, id: null, enCurso: true
      });
    });
    if (!filas.length) {
      body.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#bbb;padding:14px;">Sin registros.</td></tr>';
      if (info) info.textContent = '0 registros';
      return;
    }
    body.innerHTML = filas.map(function(r, i) {
      var badge = r.enCurso
        ? '<span class="badge" style="background:#fff3cd;color:#856404;">En curso</span>'
        : (r.comp ? '<span class="badge ok">Completo</span>' : '<span class="badge pend">Parcial</span>');
      var pdf = linkPdfEval({ id: r.id, cip: r.cip, total_resp: r.total });
      return '<tr><td style="text-align:center;font-weight:700;">'+(i+1)+'</td><td><strong>'+escHtml(r.nombres)+'</strong></td>'
        +'<td>'+escHtml(r.cip)+'</td><td>'+escHtml(r.dni)+'</td><td style="font-size:11px;">'+escHtml(r.fecha)+'</td>'
        +'<td style="text-align:center;">'+r.bloque+'/12</td><td>'+r.total+'/566</td><td>'+badge+'</td><td>'+pdf+'</td></tr>';
    }).join('');
    var enCurso = filas.filter(function(r) { return r.enCurso; }).length;
    if (info) info.textContent = filas.length + ' registros' + (enCurso ? ' (' + enCurso + ' en curso sin enviar)' : '');
  });
}

function desc(filtro, selId) {
  var v = val(selId);
  if (!v) { alert('Seleccione un '+filtro); return; }
  window.open(API+'/pdf/grupo?'+filtro+'='+encodeURIComponent(v)+'&token='+encodeURIComponent(TOKEN),'_blank');
}

function buscarPersonaU(){
  var cip=val('u-bus-cip').trim(), nom=val('u-bus-nom').trim();
  if(!cip&&!nom){alert('Ingrese CIP o nombre.');return;}
  var tbody=document.getElementById('u-bus-res');
  tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:#bbb;padding:12px;">Buscando...</td></tr>';

  if(cip){
    fetch(API+'/admin/registro-cip?cip='+encodeURIComponent(cip),{headers:hdr()}).then(function(r){return r.json();}).then(function(d){
      if(!d.ok){tbody.innerHTML='<tr><td colspan="6" style="color:#c00;padding:12px;text-align:center;">Error al buscar.</td></tr>';return;}
      var filas=[];
      if(d.diagnostico) filas.push('<tr><td colspan="6" style="background:#fff8e1;padding:10px;font-size:12px;color:#7a5c00;">'+escHtml(d.diagnostico)+'</td></tr>');
      (d.evaluaciones||[]).forEach(function(r){
        var comp=parseInt(r.total_resp)>=566;
        filas.push('<tr><td><strong>'+escHtml(r.nombres)+'</strong></td><td>'+escHtml(r.cip)+'</td>'
          +'<td style="font-size:11px;">'+escHtml(r.comisaria||r.unidad)+'</td><td style="font-size:11px;">'+escHtml(r.fecha)+'</td>'
          +'<td>'+(comp?'<span class="badge ok">Enviado</span>':'<span class="badge pend">'+r.total_resp+'/566</span>')+'</td>'
          +'<td>'+linkPdfEval(r)+'</td></tr>');
      });
      if(d.progreso && !(d.evaluaciones||[]).some(function(e){return e.completada;})){
        var p=d.progreso, pt=parseInt(p.total_resp,10)||0;
        filas.push('<tr style="background:#fffdf5;"><td><strong>'+escHtml(p.nombres)+'</strong></td><td>'+escHtml(p.cip)+'</td>'
          +'<td style="font-size:11px;">'+escHtml(p.comisaria||p.unidad)+'</td><td style="font-size:11px;">'+escHtml(p.fecha)+'</td>'
          +'<td><span class="badge" style="background:#fff3cd;color:#856404;">'+pt+'/566 sin enviar</span></td>'
          +'<td>'+linkPdfEval({ cip: p.cip, total_resp: pt })+'</td></tr>');
      }
      if(!filas.length){tbody.innerHTML='<tr><td colspan="6" style="color:#bbb;padding:12px;text-align:center;">Sin resultados.</td></tr>';return;}
      tbody.innerHTML=filas.join('');
    });
    return;
  }

  fetch(API+'/evaluaciones?busqueda='+encodeURIComponent(nom)+'&pagina=1',{headers:hdr()}).then(function(r){return r.json();}).then(function(d){
    if(!d.ok){tbody.innerHTML='<tr><td colspan="6" style="color:#c00;padding:12px;text-align:center;">Error al buscar.</td></tr>';return;}
    if(!d.rows.length){tbody.innerHTML='<tr><td colspan="6" style="color:#bbb;padding:12px;text-align:center;">Sin resultados.</td></tr>';return;}
    tbody.innerHTML=d.rows.map(function(r){
      var total=parseInt(r.total_resp,10)||0;
      var comp=total>=566 && !r.solo_progreso;
      var badge=r.solo_progreso
        ?'<span class="badge" style="background:#fff3cd;color:#856404;">'+total+'/566 sin enviar</span>'
        :(comp?'<span class="badge ok">Completo</span>':'<span class="badge pend">'+total+'/566</span>');
      var pdf = linkPdfEval(r);
      return '<tr><td><strong>'+escHtml(r.nombres)+'</strong></td><td>'+escHtml(r.cip)+'</td>'
        +'<td style="font-size:11px;">'+escHtml(r.comisaria||r.unidad)+'</td><td style="font-size:11px;">'+r.fecha+'</td>'
        +'<td>'+badge+'</td><td>'+pdf+'</td></tr>';
    }).join('');
  });
}

function linkPdfEval(r) {
  var total = parseInt(r.total_resp, 10) || 0;
  if (total < 1) return '<span style="color:#bbb;font-size:10px;">Sin PDF</span>';
  var url = r.id
    ? API + '/pdf/efectivo?id=' + r.id + '&token=' + encodeURIComponent(TOKEN)
    : (r.cip ? API + '/pdf/efectivo?cip=' + encodeURIComponent(r.cip) + '&token=' + encodeURIComponent(TOKEN) : '');
  if (!url) return '<span style="color:#bbb;font-size:10px;">Sin PDF</span>';
  return '<a href="' + url + '" target="_blank" class="btn btn-r" style="font-size:11px;padding:3px 8px;text-decoration:none;">PDF</a>';
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

// ── Utils ──────────────────────────────────────────────────────────────────────
function val(id){ var el=document.getElementById(id); return el?el.value:''; }
function set(id,v){ var el=document.getElementById(id); if(el) el.textContent=v; }
function llenarSel(id, items, ph) {
  var sel=document.getElementById(id); if(!sel) return;
  sel.innerHTML='<option value="">'+ph+'</option>';
  items.forEach(function(v){ var o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
}
