<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico?v=3" type="image/x-icon">
    <link rel="icon" href="favicon.png?v=3" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle — REGPOL Callao</title>
  <link rel="stylesheet" href="style.css?v=72">
  <link rel="stylesheet" href="responsive.css?v=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .detalle-bloque{max-width:980px;margin:0 auto;padding-top:0;}
    .detalle-icono-wrap{display:flex;justify-content:center;margin:0 0 6px;}
    .detalle-icono{width:64px;height:64px;border-radius:50%;background:#004d3d;color:#c8a94a;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,77,61,.22);border:2px solid #c8a94a;}
    .detalle-icono i{font-size:26px;line-height:1;}
    .detalle-topbar{display:grid;grid-template-columns:220px minmax(0,1fr) 220px;align-items:center;gap:10px 12px;margin:0 0 4px;}
    .detalle-topbar > *{min-width:0;}
    .detalle-topbar .btn-volver,
    .detalle-topbar .btn-registrarse,
    .detalle-topbar a.btn-volver,
    .detalle-topbar button.btn-registrarse,
    .detalle-topbar span.btn-registrarse,
    .detalle-topbar .btn-registrarse.is-disabled{
      width:220px!important;min-width:220px!important;max-width:220px!important;
      height:40px!important;min-height:40px!important;max-height:40px!important;
      padding:0 8px!important;margin:0!important;
      font-size:12px!important;font-weight:700!important;font-family:inherit!important;line-height:1!important;
      border:none!important;border-radius:7px!important;
      display:inline-flex!important;align-items:center!important;justify-content:center!important;gap:6px!important;
      box-sizing:border-box!important;white-space:nowrap!important;text-decoration:none!important;cursor:pointer;
    }
    .detalle-topbar .btn-volver{justify-self:start;background:#004d3d!important;color:#fff!important;}
    .detalle-topbar .btn-registrarse,.detalle-topbar .btn-registrarse.is-disabled{justify-self:end;background:#c8a94a!important;color:#002d24!important;}
    .detalle-topbar .btn-registrarse.is-disabled{background:#ccc!important;color:#666!important;cursor:not-allowed!important;}
    .detalle-topbar h2{margin:0;font-size:clamp(1.15rem,2.3vw,1.4rem);line-height:1.15;color:#004d3d;font-weight:800;text-align:center;}
    .detalle-meta{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;margin:0 0 10px;}
    .detalle-meta .estado-badge{margin:0;}
    .ventana-inscripcion-nota{display:block;margin:0;padding:4px 14px;border-radius:12px;font-size:12.5px;font-weight:700;line-height:1.35;}
    .ventana-inscripcion-nota.is-abierta{background:#fde8e8;color:#a94442;border:1px solid #f5c2c2;}
    .ventana-inscripcion-nota.is-cerrada{background:#d4edda;color:#1a7a3a;border:1px solid #b7dfc0;}
    .grid-detalles-duo{display:grid;grid-template-columns:minmax(240px,1fr) minmax(280px,1.15fr);gap:12px;width:100%;align-items:stretch;margin:0;}
    @media(max-width:800px){
      .detalle-topbar{grid-template-columns:1fr 1fr;gap:8px;}
      .detalle-topbar h2{grid-column:1/-1;order:-1;}
      .detalle-topbar .btn-volver,.detalle-topbar .btn-registrarse,.detalle-topbar .btn-registrarse.is-disabled,
      .detalle-topbar a.btn-volver,.detalle-topbar button.btn-registrarse,.detalle-topbar span.btn-registrarse{
        width:100%!important;min-width:0!important;max-width:none!important;
      }
      .grid-detalles-duo{grid-template-columns:1fr;}
    }
    .card-detalle{background:#fff;border-radius:12px;border:1.5px solid #c8e6c9;padding:16px 16px 14px;text-align:left;width:100%;box-sizing:border-box;}
    .card-detalle.highlight-card{border-color:#c8a94a;}
    .bloque-info-conv{margin-top:12px;padding-top:12px;border-top:1.5px solid #e0ebe4;}
    .card-detalle h3{color:#004d3d;font-size:13px;font-weight:800;letter-spacing:.5px;margin:0 0 10px;text-transform:uppercase;text-align:center;}
    .card-detalle ul{list-style:none;padding:0;text-align:left;margin:0;}
    .card-detalle ul li{padding:5px 0;font-size:13.5px;color:#555;border-bottom:1px solid #f0f0f0;}
    .card-detalle ul li:last-child{border:none;}
    .info-item{text-align:left;margin-bottom:10px;}
    .info-item span{font-size:11px;font-weight:800;color:#004d3d;letter-spacing:.5px;display:block;text-transform:uppercase;}
    .info-item p{font-size:14px;color:#444;margin:2px 0 0;}
    .price{font-size:22px;font-weight:900;color:#c8a94a;margin:4px 0 2px;}
    .tabla-cupos-wrap{width:100%;overflow-x:auto;}
    .tabla-cupos{width:100%;border-collapse:collapse;font-size:12.5px;}
    .tabla-cupos th,.tabla-cupos td{border:1px solid #b7d4c0;padding:6px 8px;}
    .tabla-cupos th{background:#004d3d;color:#fff;font-weight:700;text-align:center;font-size:11.5px;letter-spacing:.3px;}
    .tabla-cupos th:first-child,.tabla-cupos td:first-child{text-align:left;}
    .tabla-cupos td.num{text-align:center;font-variant-numeric:tabular-nums;font-weight:600;color:#004d3d;}
    .tabla-cupos tbody tr:nth-child(even){background:#f3f8f4;}
    .tabla-cupos tbody tr:hover{background:#e8f5e9;}
    .cupos-vacio{font-size:13px;color:#888;padding:8px 0;}
    .content-area.detalle-compact{padding-top:14px;padding-bottom:20px;min-height:0;display:block;}
    html,body.body-cursos{min-height:0!important;height:auto;}
    body.body-cursos .portal-footer{display:none!important;margin:0!important;padding:0!important;}
    #cuerpo-detalle{min-height:0;width:100%;}
    .btn-volver,.btn-registrarse{padding:0 10px;height:38px;border-radius:7px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;border:none;text-decoration:none;margin:0;white-space:nowrap;box-sizing:border-box;}
    .btn-volver{background:#004d3d;color:#fff;}
    .btn-volver:hover{background:#006b55;}
    .btn-registrarse{background:#c8a94a;color:#002d24;}
    .btn-registrarse:hover{background:#dfc060;color:#002d24;}
    .btn-registrarse.is-disabled{background:#ccc;color:#666;cursor:not-allowed;pointer-events:none;}
    .form-inscripcion{background:#fff;border-radius:12px;border:1.5px solid #c8e6c9;padding:24px 22px;margin:10px auto 0;text-align:left;max-width:980px;box-shadow:0 2px 10px rgba(0,77,61,.06);}
    .form-inscripcion h3{color:#004d3d;font-size:16px;font-weight:800;margin:0 0 8px;border-bottom:2px solid #c8a94a;padding-bottom:10px;letter-spacing:.2px;}
    .form-inscripcion .fi-intro{font-size:12.5px;color:#555;margin:0 0 16px;line-height:1.5;}
    .fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;}
    @media(max-width:600px){.fi-grid{grid-template-columns:1fr;}}
    .fi-group{margin-bottom:0;}
    .fi-group label{font-size:12px;font-weight:700;color:#004d3d;display:block;margin-bottom:5px;}
    .fi-group input,.fi-group select{width:100%;padding:10px 12px;border:1.5px solid #c5d9ce;border-radius:8px;font-size:13px;font-family:inherit;background:#fafcfb;color:#333;transition:border-color .15s,box-shadow .15s;}
    .fi-group input:focus,.fi-group select:focus{border-color:#004d3d;outline:none;background:#fff;box-shadow:0 0 0 3px rgba(0,77,61,.1);}
    .fi-group select{cursor:pointer;}
    .fi-full{grid-column:1/-1;}
    .fi-alerta{padding:10px 14px;border-radius:7px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;}
    .fi-alerta.ok{background:#d4edda;color:#1a7a3a;display:block;}
    .fi-alerta.error{background:#f8d7da;color:#842029;display:block;}
    .fi-hint{display:block;margin-top:5px;font-size:11px;color:#666;line-height:1.35;}
    .btn-enviar-solicitud{display:inline-block;margin-top:8px;background:#004d3d;color:#fff;padding:13px 36px;border-radius:8px;border:none;font-size:14px;font-weight:800;letter-spacing:.4px;cursor:pointer;font-family:inherit;transition:background .2s;}
    .btn-enviar-solicitud:hover{background:#006b55;}
    .btn-enviar-solicitud:disabled{opacity:.65;cursor:wait;}
    .pdf-upload-box{border:2px dashed #c8a94a;border-radius:9px;padding:16px;background:#fffdf5;grid-column:1/-1;}
    .pdf-upload-box .pdf-titulo{font-size:13px;font-weight:800;color:#c8a94a;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
    .pdf-upload-box .pdf-aviso{font-size:11.5px;color:#666;margin-bottom:10px;line-height:1.5;}
    .pdf-upload-box .pdf-aviso strong{color:#c0392b;}
    .pdf-upload-box input[type="file"]{width:100%;padding:7px;border:1.5px solid #ccc;border-radius:6px;font-size:12.5px;}
    .pdf-preview-bar{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:#555;}
    .pdf-preview-bar i{color:#e74c3c;font-size:18px;}
    .plantilla-banner{background:linear-gradient(135deg,#004d3d,#006b55);border-radius:10px;padding:16px 20px;margin:16px 0;display:flex;align-items:center;gap:14px;color:#fff;flex-wrap:wrap;}
    .plantilla-banner i.fa-file-pdf{font-size:32px;color:#c8a94a;flex-shrink:0;}
    .plantilla-banner .pb-texto{flex:1;}
    .plantilla-banner .pb-texto strong{display:block;font-size:13px;font-weight:800;margin-bottom:2px;}
    .plantilla-banner .pb-texto span{font-size:11.5px;opacity:.85;}
    .btn-desc-plantilla{background:#c8a94a;color:#002d24;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:none;text-decoration:none;white-space:nowrap;flex-shrink:0;}
    .btn-desc-plantilla:hover{background:#dfc060;}
    .estado-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;}
    .estado-DISPONIBLE{background:#d4edda;color:#1a7a3a;}
    .estado-EN-PROCESO,.estado-EN_PROCESO{background:#fff3cd;color:#856404;}
    .estado-CERRADO{background:#f8d7da;color:#842029;}
    .inscripciones-cerradas{background:#fff3cd;border:1.5px solid #ffe082;border-radius:8px;padding:14px 18px;color:#856404;font-size:13.5px;font-weight:600;text-align:center;margin-top:8px;}
    .loading-msg{text-align:center;padding:48px;color:#bbb;font-size:14px;}
  </style>
</head>

<header class="main-header">

      <img src="img/regpol-callao.jpg" alt="Escudo REGPOL Callao" class="logo-pnp" width="90" height="90">

</main>

<script src="api-config.js?v=2"></script>
<script src="portal-data.js?v=6"></script>
<script src="portal.js?v=40"></script>
<script src="areas-labor.js?v=2"></script>
<script>
var API_PUBLIC = (typeof regpolApiBase === 'function') ? regpolApiBase() : (window.REGPOL_API_BASE || '');
var ITEM_ID = null;
var ITEM_TIPO = null;
var ITEM_DATA = null;
var DIVISIONES_PUBL = [];
var MODO_REPECHAJE = /[?&]repechaje=1/.test(location.search || '');

function escHtmlD(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

function estadoBadge(estado){
  var cls='estado-'+(estado||'DISPONIBLE').replace(/\s/g,'-');
  return '<span class="estado-badge '+escHtmlD(cls)+'">'+escHtmlD(estado)+'</span>';
}

function renderDetalle(item){
  ITEM_DATA = item;
  var reqs = Array.isArray(item.requisitos) ? item.requisitos : [];
  var tipoLabel = item.tipo==='curso' ? 'CURSOS' : 'CONVENIOS';
  var tipoHref  = item.tipo==='curso' ? 'index.html#cursos' : 'index.html#convenios';
  var esConvenio = item.tipo === 'convenio';
  var esCurso = item.tipo === 'curso';

  var reqHtml = reqs.length
    ? reqs.map(function(r){return '<li>'+escHtmlD(r)+'</li>';}).join('')
    : '<li>Sin requisitos especificados.</li>';

  var infoHtml = '';
  if(item.horario) infoHtml += '<div class="info-item"><span>HORARIO:</span><p>'+escHtmlD(item.horario)+'</p></div>';
  if(item.vacantes) infoHtml += '<div class="info-item"><span>VACANTES:</span><p>'+escHtmlD(String(item.vacantes))+' efectivos</p></div>';
  if(item.lugar) infoHtml += '<div class="info-item"><span>LUGAR:</span><p>'+escHtmlD(item.lugar)+'</p></div>';
  if(esConvenio && (item.fecha_inicio || item.duracion || item.observaciones)){
    if(item.fecha_inicio) infoHtml += '<div class="info-item"><span>BENEFICIO ECONÓMICO:</span><p class="price">'+escHtmlD(item.fecha_inicio)+'</p></div>';
    if(item.duracion) infoHtml += '<div class="info-item"><p>'+escHtmlD(item.duracion)+'</p></div>';
    if(item.observaciones) infoHtml += '<div class="info-item"><small>* '+escHtmlD(item.observaciones)+'</small></div>';
  } else if(esCurso && (item.fecha_inicio || item.duracion || item.observaciones)){
    if(item.fecha_inicio) infoHtml += '<div class="info-item"><span>FECHA DE INICIO:</span><p class="price" style="color:#004d3d;">'+escHtmlD(item.fecha_inicio)+'</p></div>';
    if(item.duracion) infoHtml += '<div class="info-item"><span>DURACIÓN:</span><p>'+escHtmlD(item.duracion)+'</p></div>';
    if(item.observaciones) infoHtml += '<div class="info-item"><small>* '+escHtmlD(item.observaciones)+'</small></div>';
  }
  if(esConvenio && item.aviso_sorteo_fb) {
    infoHtml += '<div class="info-item"><span>SORTEO FACEBOOK:</span><p>'+escHtmlD(item.aviso_sorteo_fb)+'</p></div>';
  }
  if(!infoHtml) infoHtml = '<p style="color:#888;font-size:13px;margin:0;">Sin datos publicados.</p>';

  var infoTitulo = esConvenio ? 'HORARIOS / VACANTES / BENEFICIO' : 'HORARIOS / VACANTES / INICIO';

  var DIVOPUS1_CIAS = [
    'CIA CALLAO','CIA LA PUNTA','CIA BELLAVISTA','CIA CIUDADELA CHALACA',
    'CIA CIUDAD DEL PESCADOR','CIA RAMON CASTILLA','CIA LA LEGUA','CIA LA PERLA'
  ];
  var cupos = Array.isArray(item.cupos_unidades) ? item.cupos_unidades.slice() : [];
  if(!cupos.length && esConvenio){
    var totalVac = parseInt(item.vacantes, 10) || 0;
    var n = DIVOPUS1_CIAS.length;
    var base = n ? Math.floor(totalVac / n) : 0;
    var resto = n ? totalVac % n : 0;
    cupos = DIVOPUS1_CIAS.map(function(nombre, idx){
      var vac = base + (idx < resto ? 1 : 0);
      return { nombre: nombre, vacantes: vac, inscritos: 0, disponibles: vac };
    });
  }

  var ciasCard = '';
  if(cupos.length){
    ciasCard = '<div class="card-detalle">'
      +'<h3>'+(esConvenio?'COMISARÍAS':'UNIDADES')+'</h3>'
      +'<div class="tabla-cupos-wrap"><table class="tabla-cupos">'
      +'<thead><tr><th>Comisaría</th><th>Vacantes</th><th>Inscritos</th><th>Disponibles</th></tr></thead><tbody>'
      +cupos.map(function(c){
        return '<tr><td>'+escHtmlD(c.nombre||'')+'</td>'
          +'<td class="num">'+escHtmlD(String(c.vacantes!=null?c.vacantes:0))+'</td>'
          +'<td class="num">'+escHtmlD(String(c.inscritos!=null?c.inscritos:0))+'</td>'
          +'<td class="num">'+escHtmlD(String(c.disponibles!=null?c.disponibles:0))+'</td></tr>';
      }).join('')
      +'</tbody></table></div></div>';
  } else if(esConvenio){
    ciasCard = '<div class="card-detalle"><h3>COMISARÍAS</h3>'
      +'<p class="cupos-vacio">Sin cupos publicados.</p></div>';
  }

  var ventanaTxt = item.ventana_inscripcion || '';
  var btnRegistrar = '';
  var formHtml = '';
  if(item.inscripciones_abiertas){
    btnRegistrar = '<button type="button" class="btn-registrarse" id="btn-top-registrar" onclick="mostrarFormInscripcion()"><i class="fas fa-edit"></i> REGISTRARSE</button>';
    formHtml = '<div id="form-inscripcion-wrap" style="display:none;margin-top:8px;">'+renderFormInscripcion(item)+'</div>';
  } else if(item.formulario_url && item.formulario_url !== '#'){
    btnRegistrar = '<a href="'+escHtmlD(item.formulario_url)+'" target="_blank" class="btn-registrarse"><i class="fas fa-edit"></i> REGISTRARSE</a>';
  } else {
    btnRegistrar = '<span class="btn-registrarse is-disabled" title="Inscripciones no habilitadas"><i class="fas fa-lock"></i> REGISTRARSE</span>';
  }

  var iconoCls = (item.icono && String(item.icono).trim()) || (esCurso ? 'fa-graduation-cap' : 'fa-user-shield');
  if(iconoCls.indexOf('fa-') !== 0) iconoCls = 'fa-user-shield';

  document.title = escHtmlD(item.titulo) + ' — REGPOL Callao';
  document.getElementById('cuerpo-detalle').innerHTML =
    '<div class="detalle-bloque">'
    +'<div class="detalle-icono-wrap"><div class="detalle-icono" aria-hidden="true"><i class="fas '+escHtmlD(iconoCls)+'"></i></div></div>'
    +'<div class="detalle-topbar">'
    +'<a href="'+tipoHref+'" class="btn-volver"><i class="fas fa-chevron-left"></i> VOLVER A '+tipoLabel+'</a>'
    +'<h2>'+escHtmlD(item.titulo)+'</h2>'
    +btnRegistrar
    +'</div>'
    +'<div class="detalle-meta">'
    +estadoBadge(item.estado)
    +(ventanaTxt ? '<p class="ventana-inscripcion-nota '+(item.inscripciones_abiertas?'is-abierta':'is-cerrada')+'">'+escHtmlD(ventanaTxt)+'</p>' : '')
    +'</div>'
    +'<div class="grid-detalles-duo">'
    +'<div class="card-detalle highlight-card">'
    +'<h3>REQUISITOS</h3>'
    +'<ul>'+reqHtml+'</ul>'
    +'<div class="bloque-info-conv">'
    +infoHtml
    +'</div>'
    +'</div>'
    +(ciasCard || '')
    +'</div>'
    +'</div>'
    +formHtml;

  cargarDivisionesPublico();
  initCamposInscripcion();
}

function mostrarFormInscripcion(){
  var wrap = document.getElementById('form-inscripcion-wrap');
  if(wrap) wrap.style.display = 'block';
  initCamposInscripcion();
  if(wrap) wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function initCamposInscripcion(){
  var selArea = document.getElementById('fi-area');
  if(selArea && typeof regpolPoblarSelectArea === 'function'){
    regpolPoblarSelectArea(selArea, 'Seleccionar área');
  }
  toggleAreaOtroInscripcion();
  cargarDivisionesPublico();
  ['fi-cip','fi-dni'].forEach(function(id){
    var el = document.getElementById(id);
    if(el && !el.dataset.numericBound){
      el.dataset.numericBound = '1';
      el.addEventListener('input', function(e){ e.target.value = e.target.value.replace(/\D/g,''); });
    }
  });
}

var GRADOS_PNP = [
  'CORONEL PNP','COMANDANTE PNP','MAYOR PNP','CAPITAN PNP','TENIENTE PNP','ALFEREZ PNP',
  'SUPERIOR PNP','BRIGADIER PNP','TECNICO DE 1RA PNP','TECNICO DE 2DA PNP','TECNICO DE 3RA PNP',
  'SUBOFICIAL DE 1RA PNP','SUBOFICIAL DE 2DA PNP','SUBOFICIAL DE 3RA PNP'
];

var CARGOS_OPCIONES = ['ADMINISTRATIVO', 'PATRULLAJE', 'INVESTIGACIÓN', 'JEFE DE UNIDAD'];

function optsCargo(){
  return '<option value="">Seleccionar cargo</option>'
    + CARGOS_OPCIONES.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
}

function toggleAreaOtroInscripcion() {
  if (typeof regpolToggleAreaOtro === 'function') {
    regpolToggleAreaOtro('fi-area', 'fi-area-otro-box', 'fi-area-otro');
  }
}

function obtenerAreaInscripcion() {
  if (typeof regpolObtenerArea === 'function') return regpolObtenerArea('fi-area', 'fi-area-otro');
  var sel = document.getElementById('fi-area');
  return sel ? sel.value.trim() : '';
}

function optsGrado(){
  return '<option value="">Seleccionar grado</option>'
    + GRADOS_PNP.map(function(g){return '<option value="'+g+'">'+g+'</option>';}).join('');
}

function onCambioDisponibilidad(val){
  var aviso = document.getElementById('disp-aviso');
  if(aviso){
    if(val === 'VACACIONES'){
      aviso.style.display = 'block';
      aviso.textContent = 'Ocupa vacante automáticamente al preinscribirse (sin sorteo en vivo).';
    } else if(val === 'FRANCO'){
      aviso.style.display = 'block';
      aviso.textContent = 'Participará en el sorteo público con el resto de preinscritos.';
    } else {
      aviso.style.display = 'none';
      aviso.textContent = '';
    }
  }
  toggleDiaFranco(val);
}

function toggleDiaFranco(val){
  var box = document.getElementById('fi-dia-franco-box');
  if(!box) return;
  box.style.display = (val==='FRANCO') ? '' : 'none';
  var sel = document.getElementById('fi-dia-franco');
  if(sel){
    sel.required = (val==='FRANCO');
    if(val!=='FRANCO') sel.value = '';
  }
}

function calcularTiempoServicio(val){
  var el = document.getElementById('fi-tiempo-servicio');
  if(!el || !val) return;
  var egreso = new Date(val);
  if(isNaN(egreso)) return;
  var hoy = new Date();
  var anios = hoy.getFullYear() - egreso.getFullYear();
  var mes   = hoy.getMonth() - egreso.getMonth();
  if(mes < 0){ anios--; mes += 12; }
  el.value = anios+' años '+mes+' meses de servicio';
  document.getElementById('fi-tiempo-servicio').setAttribute('data-val', anios+' años '+mes+' meses');
}

function descargarPlantilla(itemId){
  fetch(API_PUBLIC + '/portal/items/'+itemId+'/plantilla')
    .then(function(r){return r.json();})
    .then(function(d){

      descargarBase64(d.pdf, d.nombre||'plantilla.pdf');
    });
}

function descargarBase64(base64, nombre){
  var byteStr = atob(base64.split(',').pop());
  var buf = new Uint8Array(byteStr.length);
  for(var i=0;i<byteStr.length;i++) buf[i]=byteStr.charCodeAt(i);
  var blob = new Blob([buf], {type:'application/pdf'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = nombre;
  a.click();
}

function cargarPdfInscripcion(input){
  var file = input.files&&input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){
    alert('El PDF no debe superar 5 MB. Reduzca el tamaño del archivo antes de adjuntarlo.');
    input.value=''; return;
  }
  var reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('fi-pdf-data').value = e.target.result;
    document.getElementById('fi-pdf-nombre').textContent = file.name+' ('+Math.round(file.size/1024)+' KB)';
    document.getElementById('fi-pdf-preview').style.display='flex';
  };
  reader.readAsDataURL(file);
}

function quitarPdfInscripcion(){
  document.getElementById('fi-pdf-data').value='';
  document.getElementById('fi-pdf-file').value='';
  document.getElementById('fi-pdf-preview').style.display='none';

function onCambioModalidadTrabajo(){
  var sel = document.getElementById('fi-modalidad');
  var box = document.getElementById('fi-modalidad-otro-box');
  if(!box) return;
  var esOtros = sel && sel.value === 'OTROS';
  box.style.display = esOtros ? 'block' : 'none';
  var inp = document.getElementById('fi-modalidad-otro');
  if(inp){ inp.required = !!esOtros; if(!esOtros) inp.value=''; }
}

function onCambioRegionInscripcion(){
  var region = (document.getElementById('fi-region')||{}).value || '';
  var dl = document.getElementById('fi-unidad-datalist');
  if(!dl) return;
  dl.innerHTML = '';
  if(region.indexOf('CALLAO') >= 0 && DIVISIONES_PUBL && DIVISIONES_PUBL.length){
    DIVISIONES_PUBL.forEach(function(div){
      (div.unidades||[]).forEach(function(u){
        var o = document.createElement('option');
        o.value = u.nombre || u;
        dl.appendChild(o);
      });
    });
  }
}

function cargarDivisionesPublico(){
  fetch(API_PUBLIC + '/config').then(function(r){return r.json();}).then(function(d){
    if(!d.ok||!d.divisiones) return;
    DIVISIONES_PUBL = d.divisiones;
    var sel = document.getElementById('fi-unidad');
    if(sel && sel.tagName === 'SELECT'){
      sel.innerHTML = '<option value="">Seleccionar unidad</option>';
      (d.divisiones||[]).forEach(function(div){
        var og = document.createElement('optgroup');
        og.label = div.nombre;
        (div.unidades||[]).forEach(function(u){
          var o = document.createElement('option');
          o.value = u.nombre;
          o.textContent = u.nombre;
          og.appendChild(o);
        });
        sel.appendChild(og);
      });
    }
    onCambioRegionInscripcion();
  });
  if(ITEM_TIPO === 'convenio'){
    fetch(API_PUBLIC + '/portal/convenios/catalogos').then(function(r){return r.json();}).then(function(d){
      if(!d.ok) return;
      var selR = document.getElementById('fi-region');
      if(selR && d.regiones){
        var cur = selR.value;
        selR.innerHTML = '<option value="">Seleccionar región</option>';
        d.regiones.forEach(function(r){
          var o = document.createElement('option');
          o.value = r; o.textContent = r;
          selR.appendChild(o);
        });
        if(cur) selR.value = cur;
      }
    }).catch(function(){});
  }
}

function enviarInscripcion(e){
  e.preventDefault();
  var alerta = document.getElementById('fi-alerta');
  alerta.className='fi-alerta'; alerta.style.display='none';

  function v(id){ var el=document.getElementById(id); return el?el.value.trim():''; }

  var cip     = v('fi-cip');
  var dni     = v('fi-dni');
  var grado   = v('fi-grado');
  var apellidos = v('fi-apellidos').toUpperCase();
  var nombresSolo = v('fi-nombres').toUpperCase();
  var nombres = (apellidos && nombresSolo) ? (apellidos + ', ' + nombresSolo) : (apellidos || nombresSolo);
  var unidad  = v('fi-unidad');
  var area    = obtenerAreaInscripcion();
  var cargo   = v('fi-cargo');
  var tel     = v('fi-telefono');
  var region  = v('fi-region');
  var modalidad = v('fi-modalidad');
  var modalidadOtro = v('fi-modalidad-otro');
  var codifin = v('fi-codifin').replace(/\D/g,'');
  
  var arma           = v('fi-arma');
  var disponibilidad = v('fi-disponibilidad');
  var dia_franco     = v('fi-dia-franco');
  var email          = v('fi-email');
  
  var fecha_egreso   = v('fi-fecha-egreso');
  var tsEl = document.getElementById('fi-tiempo-servicio');
  var tiempo_servicio = tsEl ? tsEl.value : '';
  
  var pdfEl   = document.getElementById('fi-pdf-data');
  var pdfFile = document.getElementById('fi-pdf-file');
  var pdfData = pdfEl ? pdfEl.value : '';
  var pdfNomb = (pdfFile&&pdfFile.files&&pdfFile.files[0]) ? pdfFile.files[0].name : 'requisitos.pdf';
  var esRepechaje = ITEM_TIPO==='convenio' && (MODO_REPECHAJE || /[?&]repechaje=1/.test(location.search||''));

  if(!grado||!cip||!dni||!apellidos||!nombresSolo||!unidad||!cargo||!area){
    var selArea = document.getElementById('fi-area');
    if (selArea && selArea.value === 'OTRO' && !area) {
      alerta.textContent='Seleccionó OTRO: indique el área en el cuadro de texto.';
    } else {
      alerta.textContent='Complete los campos obligatorios: grado, CIP, DNI, apellidos, nombres, unidad, cargo y área.';
    }
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && !region){
    alerta.textContent='Seleccione su Región Policial.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && !modalidad){
    alerta.textContent='Seleccione la modalidad de trabajo.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && modalidad==='OTROS' && !modalidadOtro){
    alerta.textContent='Especifique su modalidad de trabajo (Otros).';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && !/^\d{10,12}$/.test(codifin)){
    alerta.textContent='CODIFIN debe tener entre 10 y 12 dígitos numéricos.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && !tel){
    alerta.textContent='Ingrese su teléfono / WhatsApp de contacto.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && (!email || email.indexOf('@')<0)){
    alerta.textContent='Ingrese un correo electrónico válido.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && !disponibilidad){
    alerta.textContent='Indique su disponibilidad (Vacaciones o Franco).';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && disponibilidad==='FRANCO' && !dia_franco){
    alerta.textContent='Seleccione su día de franco (Par o Impar).';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='curso' && !fecha_egreso){
    alerta.textContent='Ingrese su fecha de egreso de la Escuela PNP.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if((ITEM_TIPO!=='convenio' || esRepechaje) && !pdfData){
    alerta.textContent='Debe adjuntar su expediente de requisitos en PDF.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }

  var btn = document.querySelector('#form-inscripcion button[type="submit"]');
  if(btn){btn.disabled=true;btn.textContent='Enviando...';}

  fetch(API_PUBLIC + '/portal/items/'+ITEM_ID+'/inscribir',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      cip:cip, dni:dni, grado:grado, nombres:nombres,
      unidad:unidad, area:area, cargo:cargo, telefono:tel, email:email||'',
      arma:arma, disponibilidad:disponibilidad, dia_franco:dia_franco,
      fecha_egreso:fecha_egreso||null, tiempo_servicio:tiempo_servicio,
      region_policial: region||'',
      modalidad: modalidad||'',
      modalidad_otro: modalidadOtro||'',
      codifin: codifin||'',
      pdf_requisitos: (ITEM_TIPO==='convenio' && !esRepechaje) ? '' : pdfData,
      pdf_nombre: pdfNomb,
      modo_repechaje: !!esRepechaje
    })
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){
      var nro = d.nro_registro || '';
      var aviso = d.aviso_sorteo_fb || '';
      var msg = '<strong>Registro correcto.</strong> '
        +(nro ? ('Su N° de inscripción es <strong style="font-size:16px;color:#004d3d;">'+escHtmlD(nro)+'</strong>. Consérvelo.<br/>') : '')
        +(aviso ? ('<span style="display:block;margin:8px 0;padding:8px;background:#e8f5f1;border-radius:6px;"><i class="fab fa-facebook"></i> '+escHtmlD(aviso)+'</span>') : '')
        +'<a href="consulta.html?cip='+encodeURIComponent(cip)+(nro?'&nro='+encodeURIComponent(nro):'')+'" style="color:#004d3d;font-weight:700;">Consultar con CIP + N° de inscripción</a>.';
      alerta.innerHTML=msg;
      alerta.className='fi-alerta ok'; alerta.style.display='block';
      document.getElementById('form-inscripcion').reset();
      initCamposInscripcion();
      if(pdfEl) pdfEl.value='';
      var prev=document.getElementById('fi-pdf-preview');
      if(prev) prev.style.display='none';
      var diaBox=document.getElementById('fi-dia-franco-box');
      if(diaBox) diaBox.style.display='none';
      onCambioDisponibilidad('');
      onCambioModalidadTrabajo();
      toggleAreaOtroInscripcion();
    } else {
      alerta.textContent=d.error||'Error al procesar la inscripción.';
      alerta.className='fi-alerta error'; alerta.style.display='block';
    }
  }).catch(function(){
    alerta.textContent='Error de conexión. Intente nuevamente.';
    alerta.className='fi-alerta error'; alerta.style.display='block';
  }).finally(function(){
    if(btn){
      btn.disabled=false;
      btn.textContent=textoBtnEnviar();
    }
  });
}

function cargarDetalle(){

    document.getElementById('cuerpo-detalle').innerHTML='<p class="loading-msg">No se especificó el item. <a href="cursos.html">Volver a cursos</a></p>';
    return;
  }
  fetch(API_PUBLIC + '/portal/items/'+ITEM_ID)
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok||!d.item){
        document.getElementById('cuerpo-detalle').innerHTML='<p class="loading-msg">Convocatoria no encontrada. <a href="cursos.html">Volver</a></p>';
        return;
      }
      renderDetalle(d.item);
    })
    .catch(function(){
      document.getElementById('cuerpo-detalle').innerHTML='<p class="loading-msg">Error de conexión.</p>';
    });
}

initPortalPagina({ activeNav: ITEM_TIPO || 'cursos', showPageHero: false });
cargarDetalle();
</script>
</body>
</html>
