<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle — REGPOL Callao</title>
  <link rel="stylesheet" href="style.css?v=27">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .grid-detalles{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin:24px 0;}
    .card-detalle{background:#fff;border-radius:12px;border:1.5px solid #c8e6c9;padding:28px 24px;text-align:center;}
    .card-detalle.highlight-card{border-color:#c8a94a;}
    .icon-circle{width:64px;height:64px;background:#004d3d;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px;color:#fff;}
    .icon-circle.gold{background:#c8a94a;}
    .card-detalle h3{color:#004d3d;font-size:14px;font-weight:800;letter-spacing:.5px;margin-bottom:14px;text-transform:uppercase;}
    .card-detalle ul{list-style:none;padding:0;text-align:left;}
    .card-detalle ul li{padding:6px 0;font-size:13.5px;color:#555;border-bottom:1px solid #f0f0f0;display:flex;align-items:flex-start;gap:8px;}
    .card-detalle ul li:last-child{border:none;}
    .card-detalle ul li i{color:#004d3d;margin-top:2px;flex-shrink:0;}
    .info-item{text-align:left;margin-bottom:10px;}
    .info-item span{font-size:11px;font-weight:800;color:#004d3d;letter-spacing:.5px;display:block;text-transform:uppercase;}
    .info-item p{font-size:14px;color:#444;margin:2px 0 0;}
    .price{font-size:26px;font-weight:900;color:#c8a94a;margin:8px 0 4px;}
    .registro-section{background:#fff;border-radius:12px;border:2px dashed #c8e6c9;padding:28px 24px;text-align:center;margin:20px 0;}
    .registro-section h2{color:#004d3d;font-size:16px;margin-bottom:8px;}
    .registro-section p{color:#666;font-size:13.5px;margin-bottom:16px;}
    .btn-registro-grande{background:#004d3d;color:#fff;padding:14px 28px;border-radius:8px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px;cursor:pointer;border:none;text-decoration:none;}
    .btn-registro-grande:hover{background:#006b55;}
    .btn-volver{background:#004d3d;color:#fff;padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:none;text-decoration:none;margin-top:8px;}
    .btn-volver:hover{background:#006b55;}
    /* Formulario de inscripción */
    .form-inscripcion{background:#f7faf7;border-radius:10px;border:1.5px solid #c8e6c9;padding:24px;margin-top:8px;text-align:left;}
    .form-inscripcion h3{color:#004d3d;font-size:15px;margin:0 0 16px;border-bottom:2px solid #c8a94a;padding-bottom:8px;}
    .fi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    @media(max-width:600px){.fi-grid{grid-template-columns:1fr;}}
    .fi-group{margin-bottom:0;}
    .fi-group label{font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:4px;}
    .fi-group input,.fi-group select{width:100%;padding:9px 10px;border:1.5px solid #ccc;border-radius:6px;font-size:13px;font-family:inherit;}
    .fi-group input:focus,.fi-group select:focus{border-color:#004d3d;outline:none;}
    .fi-full{grid-column:1/-1;}
    .fi-alerta{padding:10px 14px;border-radius:7px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;}
    .fi-alerta.ok{background:#d4edda;color:#1a7a3a;display:block;}
    .fi-alerta.error{background:#f8d7da;color:#842029;display:block;}
    /* PDF upload */
    .pdf-upload-box{border:2px dashed #c8a94a;border-radius:9px;padding:16px;background:#fffdf5;grid-column:1/-1;}
    .pdf-upload-box .pdf-titulo{font-size:13px;font-weight:800;color:#c8a94a;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
    .pdf-upload-box .pdf-aviso{font-size:11.5px;color:#666;margin-bottom:10px;line-height:1.5;}
    .pdf-upload-box .pdf-aviso strong{color:#c0392b;}
    .pdf-upload-box input[type="file"]{width:100%;padding:7px;border:1.5px solid #ccc;border-radius:6px;font-size:12.5px;}
    .pdf-preview-bar{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:#555;}
    .pdf-preview-bar i{color:#e74c3c;font-size:18px;}
    /* Plantilla banner */
    .plantilla-banner{background:linear-gradient(135deg,#004d3d,#006b55);border-radius:10px;padding:16px 20px;margin:16px 0;display:flex;align-items:center;gap:14px;color:#fff;}
    .plantilla-banner i.fa-file-pdf{font-size:32px;color:#c8a94a;flex-shrink:0;}
    .plantilla-banner .pb-texto{flex:1;}
    .plantilla-banner .pb-texto strong{display:block;font-size:13px;font-weight:800;margin-bottom:2px;}
    .plantilla-banner .pb-texto span{font-size:11.5px;opacity:.85;}
    .btn-desc-plantilla{background:#c8a94a;color:#002d24;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:6px;cursor:pointer;border:none;text-decoration:none;white-space:nowrap;flex-shrink:0;}
    .btn-desc-plantilla:hover{background:#dfc060;}
    .estado-badge{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;}
    .estado-DISPONIBLE{background:#d4edda;color:#1a7a3a;}
    .estado-EN-PROCESO,.estado-EN_PROCESO{background:#fff3cd;color:#856404;}
    .estado-CERRADO{background:#f8d7da;color:#842029;}
    .inscripciones-cerradas{background:#fff3cd;border:1.5px solid #ffe082;border-radius:8px;padding:14px 18px;color:#856404;font-size:13.5px;font-weight:600;text-align:center;margin-top:8px;}
    #cuerpo-detalle{min-height:300px;}
    .loading-msg{text-align:center;padding:48px;color:#bbb;font-size:14px;}
    /* Disponibilidad convenio */
    .disp-box{grid-column:1/-1;background:#fff;border:1.5px solid #c8e6c9;border-radius:10px;padding:14px;}
    .disp-box > label{font-size:13px;font-weight:800;color:#004d3d;display:block;margin-bottom:10px;}
    .disp-opciones{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:600px){.disp-opciones{grid-template-columns:1fr;}}
    .disp-btn{border:2px solid #ccc;border-radius:10px;padding:14px 12px;background:#fff;cursor:pointer;text-align:left;transition:border-color .2s,background .2s;}
    .disp-btn:hover{border-color:#004d3d;}
    .disp-btn.sel{border-color:#004d3d;background:#f0f7f0;}
    .disp-btn.sel-vac{border-color:#27ae60;background:#eafaf1;}
    .disp-btn i{font-size:20px;margin-bottom:6px;display:block;}
    .disp-btn strong{display:block;font-size:13px;color:#004d3d;margin-bottom:4px;}
    .disp-btn span{font-size:11px;color:#666;line-height:1.4;display:block;}
    .disp-btn.sel-vac strong{color:#1e8449;}
    .disp-aviso{font-size:11.5px;color:#856404;background:#fff8e1;border-radius:6px;padding:8px 10px;margin-top:10px;line-height:1.45;}
  </style>
</head>

<script>
var API_PUBLIC = window.REGPOL_API_BASE != null ? window.REGPOL_API_BASE
  : ((location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:3000' : '');
var ITEM_ID = null;
var ITEM_TIPO = null;
var ITEM_DATA = null;
var DIVISIONES_PUBL = [];

function escHtmlD(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

function estadoBadge(estado){
  var cls='estado-'+(estado||'DISPONIBLE').replace(/\s/g,'-');
  return '<span class="estado-badge '+escHtmlD(cls)+'">'+escHtmlD(estado)+'</span>';
}

function renderDetalle(item){
  ITEM_DATA = item;
  var reqs = Array.isArray(item.requisitos) ? item.requisitos : [];
  var tipoLabel = item.tipo==='curso' ? 'CURSOS' : 'CONVENIOS';
  var tipoHref  = item.tipo==='curso' ? 'cursos.html' : 'convenios.html';

  var reqHtml = reqs.length
    ? reqs.map(function(r){return '<li><i class="fas fa-check-circle"></i>'+escHtmlD(r)+'</li>';}).join('')
    : '<li><i class="fas fa-info-circle"></i> Sin requisitos especificados.</li>';

  var horarioHtml = '';
  if(item.horario) horarioHtml += '<div class="info-item"><span>TURNOS / HORARIOS:</span><p>'+escHtmlD(item.horario)+'</p></div>';
  if(item.vacantes) horarioHtml += '<div class="info-item"><span>VACANTES:</span><p>'+escHtmlD(item.vacantes)+' efectivos</p></div>';
  if(item.lugar) horarioHtml += '<div class="info-item"><span>LUGAR:</span><p>'+escHtmlD(item.lugar)+'</p></div>';

  var fechaHtml = '';
  if(item.fecha_inicio) fechaHtml += '<p class="price">'+escHtmlD(item.fecha_inicio)+'</p>';
  if(item.duracion)     fechaHtml += '<p>'+escHtmlD(item.duracion)+'</p>';
  if(item.observaciones) fechaHtml += '<small>*'+escHtmlD(item.observaciones)+'</small>';

  var accionHtml = '';
  if(item.inscripciones_abiertas){
    accionHtml = '<div class="registro-section">'
      +'<div class="registro-box">'
      +'<h2>¿Deseas postular?</h2>'
      +'<p>Completa el formulario de inscripción a continuación.</p>'
      +'</div>'
      +renderFormInscripcion(item)
      +'</div>';
  } else if(item.formulario_url && item.formulario_url !== '#'){
    accionHtml = '<div class="registro-section"><div class="registro-box">'
      +'<h2>¿Deseas postular a esta convocatoria?</h2>'
      +'<p>Puedes registrar tu inscripción mediante el formulario externo.</p>'
      +'<a href="'+escHtmlD(item.formulario_url)+'" target="_blank" class="btn-registro-grande">'
      +'<i class="fas fa-edit"></i> REGISTRAR MI INSCRIPCIÓN</a>'
      +'</div></div>';
  } else {
    accionHtml = '<div class="inscripciones-cerradas"><i class="fas fa-lock"></i> Las inscripciones no están habilitadas en este momento.</div>';
  }

  document.title = escHtmlD(item.titulo) + ' — REGPOL Callao';
  document.getElementById('cuerpo-detalle').innerHTML =
    '<div class="page-intro">'
    +'<h2>'+escHtmlD(item.titulo)+'</h2>'
    +'<p>'+escHtmlD(item.descripcion || (item.tipo==='curso'?'DETALLES DEL CURSO':'DETALLES DEL CONVENIO'))+'</p>'
    +estadoBadge(item.estado)
    +'<br/><a href="'+tipoHref+'" class="btn-volver" style="margin-top:12px;">'
    +'<i class="fas fa-chevron-left"></i> VOLVER A '+tipoLabel+'</a>'
    +'</div>'
    +'<div class="grid-detalles">'
    +'<div class="card-detalle"><div class="icon-circle"><i class="fas fa-list-ul"></i></div>'
    +'<h3>REQUISITOS</h3><ul>'+reqHtml+'</ul></div>'
    +(horarioHtml?'<div class="card-detalle"><div class="icon-circle"><i class="fas fa-clock"></i></div>'
      +'<h3>HORARIOS Y VACANTES</h3>'+horarioHtml+'</div>':'')
    +(fechaHtml?'<div class="card-detalle highlight-card"><div class="icon-circle gold"><i class="fas fa-calendar-alt"></i></div>'
      +'<h3>FECHA DE INICIO</h3>'+fechaHtml+'</div>':'')
    +'</div>'
    +accionHtml;

  cargarDivisionesPublico();
}

var GRADOS_PNP = [
  'MAYOR GENERAL PNP','CORONEL PNP','COMANDANTE PNP','MAYOR PNP','CAPITÁN PNP',
  'TENIENTE PNP','ALFÉREZ PNP','TÉCNICO SUPERIOR PNP','TÉCNICO 1° PNP','TÉCNICO 2° PNP',
  'TÉCNICO 3° PNP','SUBOFICIAL BRIGADIER PNP','SUBOFICIAL 1° PNP','SUBOFICIAL 2° PNP',
  'SUBOFICIAL 3° PNP','SUBOFICIAL DE 1RA PNP','SUBOFICIAL DE 2DA PNP','SUBOFICIAL DE 3RA PNP'
];

function optsGrado(){
  return '<option value="">— Seleccionar grado —</option>'
    + GRADOS_PNP.map(function(g){return '<option value="'+g+'">'+g+'</option>';}).join('');
}

function renderFormInscripcion(item){
  var esConvenio = item.tipo === 'convenio';
  var esCurso    = item.tipo === 'curso';
  return '<form class="form-inscripcion" id="form-inscripcion" onsubmit="enviarInscripcion(event)">'
    +'<h3><i class="fas fa-edit"></i> Formulario de Inscripción — '+(esConvenio?'CONVENIO':'CURSO')+'</h3>'
    +'<div id="fi-alerta" class="fi-alerta"></div>'
    +'<div class="fi-grid">'

    // ── FILA 1: Grado + Nombres
    +'<div class="fi-group"><label>Grado / Rango *</label>'
    +'<select id="fi-grado" required>'+optsGrado()+'</select></div>'
    +'<div class="fi-group fi-full" style="grid-column:unset"><label>Apellidos y Nombres *</label>'
    +'<input type="text" id="fi-nombres" maxlength="200" placeholder="APELLIDOS APELLIDOS, Nombres" required/></div>'

    // ── FILA 2: CIP + DNI
    +'<div class="fi-group"><label>CIP *</label>'
    +'<input type="text" id="fi-cip" maxlength="20" placeholder="Número de CIP" required/></div>'
    +'<div class="fi-group"><label>DNI *</label>'
    +'<input type="text" id="fi-dni" maxlength="12" placeholder="Número de DNI" required/></div>'

    // ── FILA 3: Unidad + Área
    +'<div class="fi-group"><label>Unidad / Dependencia *</label>'
    +'<select id="fi-unidad" required><option value="">— Seleccionar —</option></select></div>'
    +'<div class="fi-group"><label>Área / Sección</label>'
    +'<input type="text" id="fi-area" maxlength="100" placeholder="Ej: DEPINCRI, SIT, DIVPOS"/></div>'

    // ── FILA 4: Cargo
    +'<div class="fi-group"><label>Cargo</label>'
    +'<input type="text" id="fi-cargo" maxlength="80" placeholder="Ej: Jefe de guardia, Investigador"/></div>'

    // ── CAMPOS ESPECÍFICOS CONVENIO
    +(esConvenio
      ? '<div class="fi-group"><label>Arma (Condición laboral) *</label>'
        +'<select id="fi-arma" required>'
        +'<option value="">— Seleccionar —</option>'
        +'<option value="ESTADO">Estado (en actividad)</option>'
        +'<option value="PARTICULAR">Particular / Fuera de actividad</option>'
        +'</select></div>'
        +'<div class="disp-box fi-full">'
        +'<label><i class="fas fa-calendar-check"></i> ¿Cuál es su situación para el servicio? *</label>'
        +'<div class="disp-opciones">'
        +'<button type="button" class="disp-btn disp-vac" id="btn-disp-vac" onclick="seleccionarDisp(\'VACACIONES\')">'
        +'<i class="fas fa-umbrella-beach" style="color:#27ae60;"></i>'
        +'<strong>ESTOY EN VACACIONES</strong>'
        +'<span>Ocupa una vacante automáticamente. <strong>No participa</strong> en la rueda del sorteo.</span>'
        +'</button>'
        +'<button type="button" class="disp-btn disp-franco" id="btn-disp-franco" onclick="seleccionarDisp(\'FRANCO\')">'
        +'<i class="fas fa-random" style="color:#2980b9;"></i>'
        +'<strong>TRABAJO EN MI DÍA DE FRANCO</strong>'
        +'<span>Entra a la rueda del sorteo público junto con los demás efectivos.</span>'
        +'</button>'
        +'</div>'
        +'<input type="hidden" id="fi-disponibilidad" required/>'
        +'<div class="disp-aviso" id="disp-aviso" style="display:none;"></div>'
        +'</div>'
        +'<div class="fi-group" id="fi-dia-franco-box" style="display:none;">'
        +'<label>Día de franco *</label>'
        +'<select id="fi-dia-franco">'
        +'<option value="">— Seleccionar —</option>'
        +'<option value="PAR">Día PAR</option>'
        +'<option value="IMPAR">Día IMPAR</option>'
        +'</select></div>'
      : '')

    // ── CAMPOS ESPECÍFICOS CURSO
    +(esCurso
      ? '<div class="fi-group"><label>Fecha de Egreso de Escuela *</label>'
        +'<input type="date" id="fi-fecha-egreso" required onchange="calcularTiempoServicio(this.value)"/></div>'
        +'<div class="fi-group"><label>Tiempo de Servicio (calculado)</label>'
        +'<input type="text" id="fi-tiempo-servicio" readonly placeholder="Se calculará automáticamente" '
        +'style="background:#f0f7f0;color:#004d3d;font-weight:700;"/></div>'
      : '')

    // ── CONTACTO
    +'<div class="fi-group"><label>Teléfono / Celular</label>'
    +'<input type="tel" id="fi-telefono" maxlength="30" placeholder="Ej: 987654321"/></div>'
    +'<div class="fi-group"><label>Correo electrónico</label>'
    +'<input type="email" id="fi-email" maxlength="100" placeholder="correo@pnp.gob.pe"/></div>'

    // ── PDF EXPEDIENTE
    +'<div class="pdf-upload-box">'
    +'<div class="pdf-titulo"><i class="fas fa-file-pdf"></i> EXPEDIENTE DE REQUISITOS (PDF)</div>'
    +'<div class="pdf-aviso">'
    +'Escanee y adjunte <strong>todos sus documentos en un único archivo PDF</strong> correctamente ordenados.<br/>'
    +'⚠ <strong>Debe estar debidamente firmado, sin enmendaduras y con toda la documentación completa.</strong><br/>'
    +'El expediente incompleto o con errores será anulado automáticamente.<br/>'
    +'<span style="color:#004d3d;font-weight:700;">Tamaño máximo: 5 MB.</span>'
    +'</div>'
    +renderBannerPlantilla(item)
    +'<label style="font-size:12px;font-weight:700;color:#555;display:block;margin-bottom:4px;">Seleccione su PDF *</label>'
    +'<input type="file" id="fi-pdf-file" accept="application/pdf" onchange="cargarPdfInscripcion(this)" required/>'
    +'<div id="fi-pdf-preview" class="pdf-preview-bar" style="display:none;">'
    +'<i class="fas fa-file-pdf"></i><span id="fi-pdf-nombre"></span>'
    +'<button type="button" onclick="quitarPdfInscripcion()" '
    +'style="background:#c0392b;color:#fff;border:none;border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;margin-left:auto;">✕ Quitar</button>'
    +'</div>'
    +'<input type="hidden" id="fi-pdf-data"/>'
    +'</div>'

    +'</div>'
    +'<div style="margin-top:18px;text-align:center;">'
    +'<button type="submit" class="btn-registro-grande"><i class="fas fa-paper-plane"></i> ENVIAR INSCRIPCIÓN</button>'
    +'</div>'
    +'</form>';
}

function seleccionarDisp(val){
  var hid = document.getElementById('fi-disponibilidad');
  if(hid) hid.value = val;
  var btnVac = document.getElementById('btn-disp-vac');
  var btnFranco = document.getElementById('btn-disp-franco');
  var aviso = document.getElementById('disp-aviso');
  if(btnVac) btnVac.className = 'disp-btn disp-vac'+(val==='VACACIONES'?' sel-vac':'');
  if(btnFranco) btnFranco.className = 'disp-btn disp-franco'+(val==='FRANCO'?' sel':'');
  if(aviso){
    if(val==='VACACIONES'){
      aviso.style.display='block';
      aviso.innerHTML='<i class="fas fa-check-circle" style="color:#27ae60;"></i> '
        +'Al estar en <strong>VACACIONES</strong>, si su inscripción es aprobada ocupará una vacante sin necesidad del sorteo en vivo.';
    } else if(val==='FRANCO'){
      aviso.style.display='block';
      aviso.innerHTML='<i class="fas fa-info-circle" style="color:#2980b9;"></i> '
        +'Participará en el <strong>sorteo público</strong> si su expediente es verificado y aprobado.';
    } else {
      aviso.style.display='none';
    }
  }
  toggleDiaFranco(val);
}

function toggleDiaFranco(val){
  var box = document.getElementById('fi-dia-franco-box');
  if(!box) return;
  box.style.display = (val==='FRANCO') ? '' : 'none';
  var sel = document.getElementById('fi-dia-franco');
  if(sel) sel.required = (val==='FRANCO');
}

function calcularTiempoServicio(val){
  var el = document.getElementById('fi-tiempo-servicio');
  if(!el || !val) return;
  var egreso = new Date(val);
  if(isNaN(egreso)) return;
  var hoy = new Date();
  var anios = hoy.getFullYear() - egreso.getFullYear();
  var mes   = hoy.getMonth() - egreso.getMonth();
  if(mes < 0){ anios--; mes += 12; }
  el.value = anios+' años '+mes+' meses de servicio';
  document.getElementById('fi-tiempo-servicio').setAttribute('data-val', anios+' años '+mes+' meses');
}

function renderBannerPlantilla(item){
  if(!item.plantilla_pdf) return '';
  return '<div class="plantilla-banner">'
    +'<i class="fas fa-file-pdf"></i>'
    +'<div class="pb-texto">'
    +'<strong>PLANTILLA OFICIAL / MODELO</strong>'
    +'<span>Descargue el formulario modelo, llénelo a mano o digitalmente, fírmelo y adjúntelo junto con los demás documentos en un solo PDF.</span>'
    +'</div>'
    +'<button type="button" class="btn-desc-plantilla" onclick="descargarPlantilla('+item.id+')">'
    +'<i class="fas fa-download"></i> DESCARGAR PLANTILLA'
    +'</button>'
    +'</div>';
}

function descargarPlantilla(itemId){
  fetch(API_PUBLIC + '/portal/items/'+itemId+'/plantilla')
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok){alert('No hay plantilla disponible para esta convocatoria.');return;}
      descargarBase64(d.pdf, d.nombre||'plantilla.pdf');
    });
}

function descargarBase64(base64, nombre){
  var byteStr = atob(base64.split(',').pop());
  var buf = new Uint8Array(byteStr.length);
  for(var i=0;i<byteStr.length;i++) buf[i]=byteStr.charCodeAt(i);
  var blob = new Blob([buf], {type:'application/pdf'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = nombre;
  a.click();
}

function cargarPdfInscripcion(input){
  var file = input.files&&input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){
    alert('El PDF no debe superar 5 MB. Reduzca el tamaño del archivo antes de adjuntarlo.');
    input.value=''; return;
  }
  var reader = new FileReader();
  reader.onload = function(e){
    document.getElementById('fi-pdf-data').value = e.target.result;
    document.getElementById('fi-pdf-nombre').textContent = file.name+' ('+Math.round(file.size/1024)+' KB)';
    document.getElementById('fi-pdf-preview').style.display='flex';
  };
  reader.readAsDataURL(file);
}

function quitarPdfInscripcion(){
  document.getElementById('fi-pdf-data').value='';
  document.getElementById('fi-pdf-file').value='';
  document.getElementById('fi-pdf-preview').style.display='none';
}

function cargarDivisionesPublico(){
  fetch(API_PUBLIC + '/config').then(function(r){return r.json();}).then(function(d){
    if(!d.ok||!d.divisiones) return;
    DIVISIONES_PUBL = d.divisiones;
    var sel = document.getElementById('fi-unidad');
    if(!sel) return;
    (d.divisiones||[]).forEach(function(div){
      var og = document.createElement('optgroup');
      og.label = div.nombre;
      (div.unidades||[]).forEach(function(u){
        var o = document.createElement('option');
        o.value = u.nombre;
        o.textContent = u.nombre;
        og.appendChild(o);
      });
      sel.appendChild(og);
    });
  });
}

function enviarInscripcion(e){
  e.preventDefault();
  var alerta = document.getElementById('fi-alerta');
  alerta.className='fi-alerta'; alerta.style.display='none';

  function v(id){ var el=document.getElementById(id); return el?el.value.trim():''; }

  var cip     = v('fi-cip');
  var dni     = v('fi-dni');
  var grado   = v('fi-grado');
  var nombres = v('fi-nombres');
  var unidad  = v('fi-unidad');
  var area    = v('fi-area');
  var cargo   = v('fi-cargo');
  var tel     = v('fi-telefono');
  var email   = v('fi-email');
  // Convenio
  var arma           = v('fi-arma');
  var disponibilidad = v('fi-disponibilidad');
  var dia_franco     = v('fi-dia-franco');
  // Curso
  var fecha_egreso   = v('fi-fecha-egreso');
  var tsEl = document.getElementById('fi-tiempo-servicio');
  var tiempo_servicio = tsEl ? tsEl.value : '';
  // PDF
  var pdfEl   = document.getElementById('fi-pdf-data');
  var pdfFile = document.getElementById('fi-pdf-file');
  var pdfData = pdfEl ? pdfEl.value : '';
  var pdfNomb = (pdfFile&&pdfFile.files&&pdfFile.files[0]) ? pdfFile.files[0].name : 'requisitos.pdf';

  if(!grado||!cip||!dni||!nombres||!unidad){
    alerta.textContent='Complete los campos obligatorios: grado, CIP, DNI, nombres y unidad.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && !disponibilidad){
    alerta.textContent='Indique su disponibilidad (Vacaciones o Franco).';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='convenio' && disponibilidad==='FRANCO' && !dia_franco){
    alerta.textContent='Seleccione su día de franco (Par o Impar).';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(ITEM_TIPO==='curso' && !fecha_egreso){
    alerta.textContent='Ingrese su fecha de egreso de la Escuela PNP.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }
  if(!pdfData){
    alerta.textContent='Debe adjuntar su expediente de requisitos en PDF.';
    alerta.className='fi-alerta error'; alerta.style.display='block'; return;
  }

  var btn = document.querySelector('#form-inscripcion button[type="submit"]');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Enviando...';}

  fetch(API_PUBLIC + '/portal/items/'+ITEM_ID+'/inscribir',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      cip:cip, dni:dni, grado:grado, nombres:nombres,
      unidad:unidad, area:area, cargo:cargo, telefono:tel, email:email,
      arma:arma, disponibilidad:disponibilidad, dia_franco:dia_franco,
      fecha_egreso:fecha_egreso||null, tiempo_servicio:tiempo_servicio,
      pdf_requisitos:pdfData, pdf_nombre:pdfNomb
    })
  }).then(function(r){return r.json();}).then(function(d){
    if(d.ok){
      alerta.textContent='✓ Inscripción registrada. El área correspondiente revisará su expediente y se comunicará con usted.';
      alerta.className='fi-alerta ok'; alerta.style.display='block';
      document.getElementById('form-inscripcion').reset();
      if(pdfEl) pdfEl.value='';
      var prev=document.getElementById('fi-pdf-preview');
      if(prev) prev.style.display='none';
      var diaBox=document.getElementById('fi-dia-franco-box');
      if(diaBox) diaBox.style.display='none';
    } else {
      alerta.textContent=d.error||'Error al procesar la inscripción.';
      alerta.className='fi-alerta error'; alerta.style.display='block';
    }
  }).catch(function(){
    alerta.textContent='Error de conexión. Intente nuevamente.';
    alerta.className='fi-alerta error'; alerta.style.display='block';
  }).finally(function(){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="fas fa-paper-plane"></i> ENVIAR INSCRIPCIÓN';}
  });
}

function cargarDetalle(){
  ITEM_ID = getParam('id');
  ITEM_TIPO = getParam('tipo') || 'curso';
  if(!ITEM_ID){
    document.getElementById('cuerpo-detalle').innerHTML='<p class="loading-msg">No se especificó el item. <a href="cursos.html">Volver a cursos</a></p>';
    return;
  }
  fetch(API_PUBLIC + '/portal/items/'+ITEM_ID)
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok||!d.item){
        document.getElementById('cuerpo-detalle').innerHTML='<p class="loading-msg">Convocatoria no encontrada. <a href="cursos.html">Volver</a></p>';
        return;
      }
      renderDetalle(d.item);
    })
    .catch(function(){
      document.getElementById('cuerpo-detalle').innerHTML='<p class="loading-msg">Error de conexión.</p>';
    });
}

initPortalPagina({ activeNav: ITEM_TIPO || 'cursos', showPageHero: false });
cargarDetalle();
